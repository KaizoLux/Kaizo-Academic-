<script>
const SUPABASE_URL = "https://kjcifrrkfpifdrwjufau.supabase.co";
const SUPABASE_KEY = "sb_publishable_8sk82afIl_YihEiIFkvCwQ_LDz1I5C6";
let supabaseClient = null;
try {
  if (SUPABASE_URL !== "YOUR_SUPABASE_URL") {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
} catch(e) { console.warn("Supabase not configured:", e); }

window.storage = {
  async get(key, shared) {
    if (shared && supabaseClient) {
      const { data, error } = await supabaseClient.from('kaizo_storage').select('value').eq('key', key).single();
      if (error || !data) throw new Error('Key not found: ' + key);
      return { key, value: data.value, shared: true };
    }
    const val = localStorage.getItem((shared?'s:':'l:') + key);
    if (val === null) throw new Error('Key not found');
    return { key, value: val, shared: !!shared };
  },
  async set(key, value, shared) {
    if (shared && supabaseClient) {
      const { error } = await supabaseClient.from('kaizo_storage').upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
      if (error) throw error;
      return { key, value, shared: true };
    }
    localStorage.setItem((shared?'s:':'l:') + key, value);
    return { key, value, shared: !!shared };
  },
  async delete(key, shared) {
    if (shared && supabaseClient) {
      await supabaseClient.from('kaizo_storage').delete().eq('key', key);
      return { key, deleted: true, shared: true };
    }
    localStorage.removeItem((shared?'s:':'l:') + key);
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    if (shared && supabaseClient) {
      const { data, error } = await supabaseClient.from('kaizo_storage').select('key').like('key', (prefix||'') + '%');
      if (error) throw error;
      return { keys: (data||[]).map(d => d.key), prefix, shared: true };
    }
    const p = (shared?'s:':'l:') + (prefix||'');
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(p)) keys.push(k.replace(shared?'s:':'l:', ''));
    }
    return { keys, prefix, shared: !!shared };
  }
};
</script>

        <div className="tabs" style={{flexShrink:0}}>

        <div style={{overflowY:"auto",flex:1,paddingRight:"4px"}}>
          {tab==="desain" && (
            <div>
              <div className="dev-section">
                <div className="dev-section-title">🎨 Warna Background</div>
                {[
                  ["bgColor1","Background Utama",devConfig.bgColor1],
                  ["bgColor2","Background Sekunder",devConfig.bgColor2],
                  ["accentColor","Warna Aksen (Biru Neon)",devConfig.accentColor],

              <div className="dev-section">
                <div className="dev-section-title">🔤 Font</div>

            <div>
              <div className="dev-section">
                <div className="dev-section-title">💾 Export & Import Data</div>

                <div className="export-grid">
                  <button className="btn btn-primary" onClick={exportData}>📤 Export JSON</button>
                  <div style={{position:"relative"}}>
                    <input type="file" accept=".json" style={{display:"none"}} id="import-file" onChange={importData}/>
                    <button className="btn btn-ghost btn-full" onClick={()=>document.getElementById("import-file").click()}>📥 Import JSON</button>
                  </div>
                </div>
              </div>
              <div className="dev-section">
                <div className="dev-section-title">⚠️ Reset Sistem</div>
                <div className="sub">Reset semua pengaturan desain ke default. Data soal tidak terpengaruh.</div>
                <button className="btn btn-danger" onClick={resetSystem}>🗑 Reset Desain ke Default</button>
              </div>
              <div className="dev-section">
                <div className="dev-section-title">ℹ️ Info Sistem</div>
                <div style={{background:"rgba(0,200,255,0.04)",border:"1px solid var(--border-dim)",borderRadius:10,padding:16,fontFamily:"var(--font-mono)",fontSize:".78rem",color:"var(--text-secondary)",lineHeight:2}}>
                  <div>Versi: <span style={{color:"var(--neon-blue)"}}>Kaizo Academic v2.0</span></div>
                  <div>Total Soal: <span style={{color:"var(--neon-green)"}}>{questions.length}</span></div>
                  <div>Durasi: <span style={{color:"var(--neon-blue)"}}>{config.duration} menit</span></div>
                  <div>Max Pelanggaran: <span style={{color:"var(--neon-orange)"}}>{config.maxViolations}×</span></div>
                  <div>Storage: <span style={{color:supabaseClient?"var(--neon-green)":"var(--neon-orange)"}}>{supabaseClient?"Supabase (Online)":"LocalStorage (Offline)"}</span></div>
                </div>
              </div>
            </div>
          )}

      </div>
    </div>
  );
}

function applyDevTheme(dev) {
  const r = document.documentElement.style;
  if(dev.bgColor1) r.setProperty('--dev-bg1', dev.bgColor1);
  if(dev.bgColor2) r.setProperty('--dev-bg2', dev.bgColor2);
  if(dev.accentColor) { r.setProperty('--dev-accent', dev.accentColor); r.setProperty('--neon-blue', dev.accentColor); }
  if(dev.accent2Color) { r.setProperty('--dev-accent2', dev.accent2Color); r.setProperty('--neon-purple', dev.accent2Color); }
  if(dev.textColor) { r.setProperty('--dev-text', dev.textColor); r.setProperty('--text-primary', dev.textColor); }
  if(dev.bgColor1) r.setProperty('--bg-primary', dev.bgColor1);
  if(dev.bgColor2) r.setProperty('--bg-secondary', dev.bgColor2);
  if(dev.font) r.setProperty('--font-display', `'${dev.font}', monospace`);
  const sizeMap = {small:"14px", medium:"16px", large:"18px", xlarge:"20px"};
  document.documentElement.style.fontSize = sizeMap[dev.fontSize||"medium"] || "16px";
  document.body.style.background = dev.bgColor1||"#020408";
  if(dev.bgImageUrl) document.body.style.backgroundImage = `url(${dev.bgImageUrl})`;
  else document.body.style.backgroundImage = "";
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("lobby");
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [questions, setQuestions] = useState(DEFAULT_QUESTIONS);
  const [devConfig, setDevConfig] = useState(DEFAULT_DEV);
  const [regData, setRegData] = useState({ name:"", nim:"", email:"" });
  const [regErr, setRegErr] = useState(""); const [regLoad, setRegLoad] = useState(false);
  const [answers, setAnswers] = useState([]);
  const [curQ, setCurQ] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [violations, setViolations] = useState(0);
  const [cheatModal, setCheatModal] = useState(false);
  const [resetModal, setResetModal] = useState(false);
  const [result, setResult] = useState(null);
  const [leaderboard, setLb] = useState([]);
  const [lbLoad, setLbLoad] = useState(false);
  const [resultTab, setResultTab] = useState("result");
  const [adminModal, setAdminModal] = useState(false);
  const [adminPass, setAdminPass] = useState(""); const [adminErr, setAdminErr] = useState(""); const [adminDest, setAdminDest] = useState("admin");
  const [adminTab, setAdminTab] = useState("soal");
  const [saveMsg, setSaveMsg] = useState("");
  const [showDev, setShowDev] = useState(false);
  const [shuffledQ, setShuffledQ] = useState([]);
  const examActive = useRef(false);
  const timerRef = useRef(null);
  const violRef = useRef(0);
  const warnOpen = useRef(false);
  const lastCheatTime = useRef(0);

  useEffect(() => {
    loadConfig();
    // Load dev config
    try {
      const saved = localStorage.getItem("kaizo:dev");
      if(saved) { const d=JSON.parse(saved); setDevConfig(d); applyDevTheme(d); }
    } catch {}
  }, []);

  // ── storage ────────────────────────────────────────────────────────────────
  async function loadConfig() {
    try {
      const r = await window.storage.get("kaizo:config", true);
      if (r) { const c = JSON.parse(r.value); setConfig(c.config||DEFAULT_CONFIG); setQuestions(c.questions||DEFAULT_QUESTIONS); }
    } catch {}
  }
  async function saveConfig(newConfig, newQuestions) {
    try {
      await window.storage.set("kaizo:config", JSON.stringify({ config: newConfig, questions: newQuestions }), true);
      setSaveMsg("✓ Tersimpan"); setTimeout(() => setSaveMsg(""), 2000);
    } catch { setSaveMsg("✗ Gagal"); }
  }
  async function loadLeaderboard() {
    setLbLoad(true);
    try {
      const keys = await window.storage.list("lb:", true);
      const entries = [];
      for (const key of keys.keys) {
        try { const r = await window.storage.get(key, true); if (r) entries.push(JSON.parse(r.value)); } catch {}
      }
      entries.sort((a,b) => b.score - a.score || a.time - b.time);
      setLb(entries.slice(0,10));
    } catch {}
    setLbLoad(false);
  }
  async function checkEmail(email) {
    try { await window.storage.get(`lb:${email.toLowerCase()}`, true); return true; } catch { return false; }
  }
  async function saveScore(entry) {
    try { await window.storage.set(`lb:${entry.email.toLowerCase()}`, JSON.stringify(entry), true); } catch {}
  }
  async function clearLeaderboard() {
    try {
      const keys = await window.storage.list("lb:", true);
      for (const key of keys.keys) { try { await window.storage.delete(key, true); } catch {} }
      setLb([]);
    } catch {}
  }

  // ── register ───────────────────────────────────────────────────────────────
  async function handleRegister() {
    const { name, email } = regData;
    if (!name.trim()) return setRegErr("Nama wajib diisi");
    if (!email.trim() || !email.includes("@")) return setRegErr("Email tidak valid");
    setRegLoad(true); setRegErr("");
    const exists = await checkEmail(email);
    if (exists) { setRegErr("Email ini sudah pernah mengerjakan. 1 email = 1 kesempatan."); setRegLoad(false); return; }
    setRegLoad(false);
    startExam();
  }

  // ── exam ───────────────────────────────────────────────────────────────────
  function startExam() {
    // Shuffle questions
    let sq = [...questions].map((q,i)=>({...q, _orig:i})).sort(()=>Math.random()-.5);
    // Shuffle answers if enabled
    if(devConfig.randomAnswers !== false) {
      sq = sq.map(q => {
        const indices = [0,1,2,3].sort(()=>Math.random()-.5);
        const newOptions = indices.map(i=>q.options[i]);
        const newAnswer = indices.indexOf(q.answer);
        return {...q, options:newOptions, answer:newAnswer};
      });
    }
    setShuffledQ(sq);
    setScreen("exam"); setAnswers(new Array(sq.length).fill(null));
    setCurQ(0); setTimeLeft(config.duration * 60); setViolations(0);
    violRef.current = 0; examActive.current = true;
    startTimer(); setTimeout(bindAC, 300);
  }
  function startTimer() {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if (t <= 1) { clearInterval(timerRef.current); if (examActive.current) doSubmit(); return 0; } return t-1; });
    }, 1000);
  }
  function stopTimer() { clearInterval(timerRef.current); }
  function bindAC() { document.addEventListener("visibilitychange", onVis); }
  function unbindAC() { document.removeEventListener("visibilitychange", onVis); }
  function onVis() {
    if (!examActive.current) return;
    if (document.visibilityState !== "hidden") return;
    const now = Date.now();
    if (now - lastCheatTime.current < 1000) return;
    lastCheatTime.current = now;
    setTimeout(() => { if (document.hidden && examActive.current) cheat(); }, 500);
  }
  function cheat() {
    if (warnOpen.current) return;
    violRef.current += 1; setViolations(violRef.current);
    if (violRef.current > (config.maxViolations||2)) { warnOpen.current=true; stopTimer(); setResetModal(true); }
    else { warnOpen.current=true; stopTimer(); setCheatModal(true); }
  }
  function closeCheat() { setCheatModal(false); warnOpen.current=false; startTimer(); }
  function doResetExam() {
    setResetModal(false); warnOpen.current=false;
    setAnswers(new Array(shuffledQ.length).fill(null));
    setCurQ(0); setTimeLeft(config.duration*60); violRef.current=0; setViolations(0); startTimer();
  }
  async function doSubmit() {
    examActive.current=false; stopTimer(); unbindAC();
    const qs = shuffledQ.length > 0 ? shuffledQ : questions;
    let benar=0;
    qs.forEach((q,i) => { if (answers[i]===q.answer) benar++; });
    const score = Math.round(benar/qs.length*100);
    const entry = { name:regData.name, nim:regData.nim, email:regData.email, score, benar, violations:violRef.current, time:Date.now() };
    setResult({ ...entry, answers:[...answers], questions: qs });
    await saveScore(entry);
    loadLeaderboard();
    setScreen("result");
  }
  function confirmSubmit() {
    const un = answers.filter(a=>a===null).length;
    if (un>0 && !window.confirm(`${un} soal belum dijawab. Kumpulkan?`)) return;
    doSubmit();
  }

  // ── grade ──────────────────────────────────────────────────────────────────
  function gradeInfo(score) {
    if (score>=90) return { grade:"A — SANGAT BAIK", color:"var(--neon-green)", msg:"Luar biasa! Sempurna! 🎯" };
    if (score>=80) return { grade:"B — BAIK", color:"var(--neon-blue)", msg:"Bagus! Hampir sempurna. 👍" };
    if (score>=70) return { grade:"C — CUKUP", color:"var(--neon-orange)", msg:"Cukup baik, terus tingkatkan. 📖" };
    return { grade:"D — PERLU BELAJAR", color:"var(--neon-red)", msg:"Jangan menyerah, pelajari lagi!" };
  }

  // ── admin ──────────────────────────────────────────────────────────────────
  function tryAdmin() {
    if (adminPass === ADMIN_PASS) {
      setAdminModal(false); setAdminErr(""); setAdminPass("");
      if(adminDest==="admin") { setScreen("admin"); loadLeaderboard(); }
      else if(adminDest==="pengaturan") setScreen("pengaturan");
      else if(adminDest==="dev") setShowDev(true);
    } else setAdminErr("Password salah");
  }

  // ════════════════════════════════ RENDER ═════════════════════════════════════

  // LOBBY
  if (screen === "lobby") return (
    <div className="wrap fadein">
      {showDev && <DevMenu devConfig={devConfig} setDevConfig={setDevConfig} questions={questions} setQuestions={setQuestions} config={config} saveConfig={saveConfig} onClose={()=>setShowDev(false)}/>}
      {adminModal && (
        <div className="ov">
          <div className="modal success">

              <button className="btn btn-primary" style={{flex:1}} onClick={tryAdmin}>Masuk →</button>
            </div>
          </div>
        </div>

      <div className="topbar">
        <Logo devConfig={devConfig}/>
        <div className="row" style={{gap:8}}>
          <div className="pill"><div className="pill-dot"/>ANTI-CHEAT v2</div>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setAdminDest("admin");setAdminModal(true);}}>⚙ Admin</button>
        </div>
      </div>

      <div className="card fadein">
        <div className="hero">
          <div className="hero-badge">⚡ SISTEM UJIAN ONLINE</div>
          <div className="hero-title">{config.title}</div>
          <div className="hero-sub">{questions.length} soal pilihan ganda · {config.duration} menit · Anti-cheat aktif</div>
          <div className="hero-stats">
            <div><div className="hero-stat-val">{questions.length}</div><div className="hero-stat-lbl">Soal</div></div>
            <div><div className="hero-stat-val">{config.duration}'</div><div className="hero-stat-lbl">Durasi</div></div>
            <div><div className="hero-stat-val">{config.maxViolations}×</div><div className="hero-stat-lbl">Maks Viol.</div></div>
          </div>
        </div>

          <div className="menu-label">Mulai Quiz</div>
        </div>
        <div className="menu-btn" onClick={()=>{loadLeaderboard();setScreen("lbonly");}}>
          <div className="menu-icon">🏆</div>
          <div className="menu-label">Leaderboard</div>
        </div>
        <div className="menu-btn" onClick={()=>{loadLeaderboard();setScreen("stats");}}>
          <div className="menu-icon">📊</div>
          <div className="menu-label">Statistik</div>
        </div>
        <div className="menu-btn" onClick={()=>{setAdminDest("pengaturan");setAdminModal(true);}}>
          <div className="menu-icon">⚙️</div>
          <div className="menu-label">Pengaturan</div>
        </div>
        <div className="menu-btn menu-dev" onClick={()=>{setAdminDest("dev");setAdminModal(true);}}>

          <div className="menu-label">Dev Menu</div>

          <div key={i} className="menu-btn" onClick={()=>m.url&&m.url!=="##"&&window.open(m.url,"_blank")}>

            <div className="menu-label">{m.label||"Menu"}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // REGISTER
  if (screen === "register") return (
    <div className="wrap fadein">
      <div className="topbar">
        <Logo devConfig={devConfig}/>
        <button className="btn btn-ghost btn-sm" onClick={()=>setScreen("lobby")}>← Kembali</button>
      </div>
      <div className="card fadein">
        <div className="h2">Daftar & Mulai Ujian</div>
        <div className="sub">Isi data diri sebelum mengerjakan. 1 email hanya bisa submit 1 kali.</div>
        <div className="fgroup">
          <label className="flabel">Nama Lengkap *</label>
          <input className="finput" placeholder="Nama lengkap" value={regData.name} onChange={e=>setRegData(p=>({...p,name:e.target.value}))}/>
        </div>
        <div className="fgroup">
          <label className="flabel">NIM / Nomor Peserta</label>
          <input className="finput" placeholder="Opsional" value={regData.nim} onChange={e=>setRegData(p=>({...p,nim:e.target.value}))}/>
        </div>
        <div className="fgroup" style={{marginBottom:0}}>
          <label className="flabel">Email *</label>
          <input className={`finput${regErr?" err":""}`} type="email" placeholder="nama@email.com"
            value={regData.email} onChange={e=>{setRegData(p=>({...p,email:e.target.value}));setRegErr("");}}/>
          {regErr && <div style={{color:"var(--neon-red)",fontSize:".82rem",marginTop:8,fontFamily:"var(--font-display)",letterSpacing:1}}>{regErr}</div>}
        </div>
      </div>
      <div className="card fadein fadein-d1" style={{background:"rgba(255,140,0,0.04)",borderColor:"rgba(255,140,0,0.2)"}}>
        <div className="row" style={{alignItems:"flex-start",gap:12}}>
          <div style={{fontSize:"1.4rem"}}>🛡</div>
          <div>
            <div style={{fontFamily:"var(--font-display)",fontWeight:700,marginBottom:5,fontSize:".82rem",letterSpacing:1,color:"var(--neon-orange)"}}>ANTI-CHEAT AKTIF</div>
            <div style={{fontSize:".82rem",color:"var(--text-secondary)",lineHeight:1.7}}>
              {questions.length} soal · {config.duration} menit · Maks. {config.maxViolations}× pelanggaran sebelum reset · Soal diacak otomatis
            </div>
          </div>
        </div>
      </div>
      <button className="btn btn-primary btn-full btn-xl fadein fadein-d2" onClick={handleRegister} disabled={regLoad} style={{marginTop:6}}>
        {regLoad ? "⏳ Memeriksa..." : "⚡ Mulai Ujian →"}
      </button>
    </div>
  );

  // LEADERBOARD ONLY
  if (screen === "lbonly") return (
    <div className="wrap fadein">
      <div className="topbar"><Logo devConfig={devConfig}/><button className="btn btn-ghost btn-sm" onClick={()=>setScreen("lobby")}>← Lobby</button></div>
      <LbPanel lb={leaderboard} loading={lbLoad} myEmail={null} onRefresh={loadLeaderboard}/>
    </div>
  );

  // STATS
  if (screen === "stats") return (
    <div className="wrap fadein">
      <div className="topbar"><Logo devConfig={devConfig}/><button className="btn btn-ghost btn-sm" onClick={()=>setScreen("lobby")}>← Lobby</button></div>
      <div className="card">
        <div className="h2" style={{marginBottom:20}}>📊 Statistik Ujian</div>
        {lbLoad ? <div className="loading-bar"><span/><span/><span/><span/></div> : leaderboard.length===0 ? (
          <div className="tc" style={{padding:"40px 0",color:"var(--text-muted)"}}>
            <div style={{fontSize:"2.5rem",marginBottom:12,opacity:.4}}>📭</div>
            <div style={{fontFamily:"var(--font-display)",fontSize:".75rem",letterSpacing:2}}>BELUM ADA DATA</div>
          </div>
        ) : (
          <>
            <div className="sgrid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
              <div className="sbox"><div className="sval neon">{leaderboard.length}</div><div className="slbl">Peserta</div></div>
              <div className="sbox"><div className="sval neon-green">{Math.max(...leaderboard.map(e=>e.score))}</div><div className="slbl">Nilai Tertinggi</div></div>
              <div className="sbox"><div className="sval" style={{color:"var(--neon-orange)"}}>{Math.round(leaderboard.reduce((s,e)=>s+e.score,0)/leaderboard.length)}</div><div className="slbl">Rata-rata</div></div>
              <div className="sbox"><div className="sval neon-red">{Math.min(...leaderboard.map(e=>e.score))}</div><div className="slbl">Nilai Terendah</div></div>
            </div>
            <div className="divider"/>
            <div style={{fontFamily:"var(--font-display)",fontSize:".65rem",letterSpacing:2,color:"var(--text-muted)",marginBottom:14}}>DISTRIBUSI NILAI</div>
            {[{label:"90-100 (A)",min:90,max:100,color:"var(--neon-green)"},
              {label:"80-89 (B)",min:80,max:89,color:"var(--neon-blue)"},
              {label:"70-79 (C)",min:70,max:79,color:"var(--neon-orange)"},
              {label:"<70 (D)",min:0,max:69,color:"var(--neon-red)"}
            ].map(({label,min,max,color})=>{
              const cnt = leaderboard.filter(e=>e.score>=min&&e.score<=max).length;
              const pct = Math.round(cnt/leaderboard.length*100);
              return (
                <div key={label} style={{marginBottom:12}}>
                  <div className="row" style={{marginBottom:5}}>
                    <div style={{fontSize:".8rem",color:"var(--text-secondary)",fontFamily:"var(--font-display)",fontSize:".65rem",letterSpacing:1}}>{label}</div>
                    <div className="sp"/>
                    <div style={{fontFamily:"var(--font-display)",fontSize:".7rem",color,fontWeight:700}}>{cnt} peserta ({pct}%)</div>
                  </div>
                  <div className="prog"><div className="progf" style={{width:`${pct}%`,background:color,boxShadow:`0 0 8px ${color}88`}}/></div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );

  // EXAM
  if (screen === "exam") {
    const qs = shuffledQ.length > 0 ? shuffledQ : questions;
    const q = qs[curQ];
    const vc = Math.min(violations, 2);
    const pct = Math.round((curQ)/qs.length*100);
    const isWarn = timeLeft <= 120; const isCrit = timeLeft <= 30;
    return (
      <div className="wrap">
        {cheatModal && (
          <div className="ov"><div className="modal danger shake">
            <div style={{fontSize:"2.8rem",marginBottom:14}}>⚠️</div>
            <div style={{fontFamily:"var(--font-display)",fontSize:"1rem",fontWeight:800,color:"var(--neon-red)",marginBottom:8,letterSpacing:2}}>PELANGGARAN TERDETEKSI</div>
            <div className="badge badge-red" style={{marginBottom:14,fontSize:".7rem"}}>
              {violations} / {config.maxViolations} PELANGGARAN
            </div>
            <div style={{color:"var(--text-secondary)",fontSize:".86rem",lineHeight:1.7,marginBottom:24}}>
              {violations>=config.maxViolations ? "⚠️ Ini pelanggaran terakhir! Keluar lagi = ujian direset." : `Pelanggaran ke-${violations} dari ${config.maxViolations}. Jangan berpindah tab!`}
            </div>
            <button className="btn btn-danger btn-full" onClick={closeCheat}>Saya Mengerti — Kembali ke Ujian</button>
          </div></div>
        )}
        {resetModal && (
          <div className="ov"><div className="modal danger">
            <div style={{fontSize:"2.8rem",marginBottom:14}}>🚫</div>
            <div style={{fontFamily:"var(--font-display)",fontSize:"1rem",fontWeight:800,color:"var(--neon-red)",marginBottom:8,letterSpacing:2}}>UJIAN DIRESET!</div>
            <div style={{color:"var(--text-secondary)",fontSize:".86rem",lineHeight:1.7,marginBottom:24}}>Batas pelanggaran terlampaui. Semua jawaban dihapus.</div>
            <button className="btn btn-danger btn-full" onClick={doResetExam}>Mulai Ulang</button>
          </div></div>
        )}

        <div className="acbar">
          <div className="acdot"/>
          <span>ANTI-CHEAT AKTIF — Jangan berpindah tab</span>
          <div className="sp"/>
          <div className={`vbadge vb${vc}`}>{violations} PELANGGARAN</div>
        </div>

        <div className="card" style={{padding:"16px 22px",marginBottom:14}}>
          <div className="row">
            <div>
              <div style={{fontFamily:"var(--font-display)",fontSize:".55rem",color:"var(--text-muted)",letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Sesi Ujian</div>
              <div style={{fontFamily:"var(--font-display)",fontSize:".78rem",fontWeight:700,color:"var(--text-secondary)"}}>{regData.name}</div>
            </div>
            <div className="sp"/>
            <div className="tc">
              <div style={{fontFamily:"var(--font-display)",fontSize:".55rem",color:"var(--text-muted)",letterSpacing:2,marginBottom:4}}>SOAL</div>
              <div style={{fontFamily:"var(--font-display)",fontWeight:800,fontSize:".9rem"}}><span style={{color:"var(--neon-blue)"}}>{curQ+1}</span><span style={{color:"var(--text-muted)"}}>/{qs.length}</span></div>
            </div>
            <div style={{width:1,height:36,background:"var(--border-dim)",margin:"0 12px"}}/>
            <div className="tc">
              <div style={{fontFamily:"var(--font-display)",fontSize:".55rem",color:"var(--text-muted)",letterSpacing:2,marginBottom:4}}>WAKTU</div>
              <div className={`timer-display${isWarn&&!isCrit?" timer-warn":""}${isCrit?" timer-crit":""}`}>{fmt(timeLeft)}</div>
            </div>
          </div>
          <div style={{marginTop:12}}>
            <div className="prog"><div className="progf" style={{width:`${pct}%`}}/></div>
          </div>
        </div>

        <div className="card fadein">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
            <span className="qnum">Soal {curQ+1}</span>
            <div className="sp"/>
            <span className="badge badge-blue">{answers.filter(a=>a!==null).length} dijawab</span>
          </div>
          {q.image && <img src={q.image} alt="soal" className="q-image"/>}
          <div style={{fontFamily:"var(--font-body)",fontSize:"1.05rem",fontWeight:600,lineHeight:1.7,marginBottom:20,color:"var(--text-primary)"}}>{q.text}</div>
          {["A","B","C","D"].map((lbl,oi)=>(
            <button key={oi} className={`optb${answers[curQ]===oi?" sel":""}`} onClick={()=>{
              const na=[...answers]; na[curQ]=oi; setAnswers(na);
            }}>
              <div className="optk">{lbl}</div>
              <div>{q.options[oi]}</div>
            </button>
          ))}
        </div>

        <div className="row mt12" style={{gap:10}}>
          <button className="btn btn-ghost" disabled={curQ===0} onClick={()=>setCurQ(q=>q-1)}>← Prev</button>

          {/* Navigation dots */}
          <div className="row" style={{gap:4,flexWrap:"wrap",justifyContent:"center"}}>
            {qs.slice(Math.max(0,curQ-4),Math.min(qs.length,curQ+5)).map((_,i)=>{
              const idx = Math.max(0,curQ-4)+i;
              return (
                <div key={idx} onClick={()=>setCurQ(idx)} style={{
                  width:28,height:28,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"var(--font-display)",fontSize:".6rem",fontWeight:700,cursor:"pointer",transition:".15s",
                  background:idx===curQ?"rgba(0,200,255,0.2)":answers[idx]!==null?"rgba(0,255,157,0.1)":"rgba(0,200,255,0.04)",
                  border:`1px solid ${idx===curQ?"rgba(0,200,255,0.6)":answers[idx]!==null?"rgba(0,255,157,0.3)":"var(--border-dim)"}`,
                  color:idx===curQ?"var(--neon-blue)":answers[idx]!==null?"var(--neon-green)":"var(--text-muted)"
                }}>{idx+1}</div>
              );
            })}
          </div>
          <div className="sp"/>
          {curQ < qs.length-1
            ? <button className="btn btn-primary" onClick={()=>setCurQ(q=>q+1)}>Next →</button>
            : <button className="btn btn-success" onClick={confirmSubmit}>✓ Kumpulkan</button>
          }
        </div>
        <button className="btn btn-danger btn-full mt12 btn-sm" onClick={confirmSubmit}>Kumpulkan Sekarang</button>
      </div>
    );
  }

  // RESULT
  if (screen === "result" && result) {
    const gi = gradeInfo(result.score);
    const qs = result.questions || questions;
    return (
      <div className="wrap fadein">
        <div className="topbar"><Logo devConfig={devConfig}/><button className="btn btn-ghost btn-sm" onClick={()=>setScreen("lobby")}>← Lobby</button></div>

          <button className={`tab${resultTab==="lb"?" on":""}`} onClick={()=>{setResultTab("lb");loadLeaderboard();}}>🏆 Leaderboard</button>
        </div>
        {resultTab==="result" && (
          <>
            <div className="card tc fadein">
              <ScoreRing score={result.score} color={gi.color}/>
              <div style={{fontFamily:"var(--font-display)",fontSize:"1.1rem",fontWeight:800,letterSpacing:2,color:gi.color,marginBottom:6}}>{gi.grade}</div>
              <div style={{fontSize:"1rem",color:"var(--text-secondary)",marginBottom:4}}>{gi.msg}</div>
              <div style={{fontFamily:"var(--font-display)",fontSize:".7rem",letterSpacing:2,color:"var(--text-muted)"}}>SELAMAT, {result.name.toUpperCase()}!</div>

            <div className="row fadein fadein-d1" style={{gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setScreen("lobby");setRegData({name:"",nim:"",email:""});}}>← Lobby</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={()=>{setRegData({name:result.name,nim:result.nim||"",email:""});setScreen("register");}}>🔄 Ulangi</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>{setResultTab("lb");loadLeaderboard();}}>🏆 LB</button>
            </div>
          </>
        )}
        {resultTab==="review" && (
          <div className="card fadein">
            <div className="h2" style={{marginBottom:16}}>Pembahasan</div>
            {qs.map((q,i)=>{
              const ua=result.answers[i]; const ok=ua===q.answer;
              return (
                <div key={i} className={`rvit ${ok?"ok":"fl"}`}>
                  <div style={{fontFamily:"var(--font-display)",fontSize:".6rem",fontWeight:700,letterSpacing:2,color:ok?"var(--neon-green)":"var(--neon-red)",marginBottom:6}}>{ok?"✓ BENAR":"✗ SALAH"} — SOAL {i+1}</div>
                  <div style={{fontWeight:600,marginBottom:8,fontSize:".9rem",color:"var(--text-primary)"}}>{q.text}</div>
                  {q.image && <img src={q.image} alt="" style={{maxHeight:80,borderRadius:8,marginBottom:8,width:"100%",objectFit:"contain"}}/>}
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:".82rem",color:"var(--text-secondary)"}}>
                    <span>Jawabanmu: <strong style={{color:ok?"var(--neon-green)":"var(--neon-red)"}}>{ua!==null?`${["A","B","C","D"][ua]}. ${q.options[ua]}`:"(tidak dijawab)"}</strong></span>
                    {!ok && <span>Benar: <strong style={{color:"var(--neon-green)"}}>{["A","B","C","D"][q.answer]}. {q.options[q.answer]}</strong></span>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {resultTab==="lb" && <LbPanel lb={leaderboard} loading={lbLoad} myEmail={result.email} onRefresh={loadLeaderboard}/>}
      </div>
    );
  }


  // PENGATURAN
  if (screen === "pengaturan") return (
    <div className="wrap fadein">
      <div className="topbar"><Logo devConfig={devConfig}/><button className="btn btn-ghost btn-sm" onClick={()=>setScreen("lobby")}>← Lobby</button></div>
      <div className="card fadein">
        <div className="h2" style={{marginBottom:5}}>⚙️ Pengaturan Ujian</div>
        <div className="sub">Konfigurasi ujian yang akan ditampilkan ke peserta.</div>
        <div className="fgroup">
          <label className="flabel">Judul Ujian</label>
          <input className="finput" value={config.title} onChange={e=>setConfig(p=>({...p,title:e.target.value}))} onBlur={()=>saveConfig(config,questions)}/>
        </div>
        <div className="frow">
          <div className="fgroup">
            <label className="flabel">Durasi (menit)</label>
            <input className="finput" type="number" min="1" max="180" value={config.duration}
              onChange={e=>setConfig(p=>({...p,duration:parseInt(e.target.value)||10}))} onBlur={()=>saveConfig(config,questions)}/>
          </div>
          <div className="fgroup">
            <label className="flabel">Maks. Pelanggaran</label>
            <select className="fselect" value={config.maxViolations} onChange={e=>{const nc={...config,maxViolations:parseInt(e.target.value)};setConfig(nc);saveConfig(nc,questions);}}>
              <option value="1">1× langsung reset</option>
              <option value="2">2× baru reset</option>
              <option value="3">3× baru reset</option>
            </select>
          </div>
        </div>
        <div className="divider"/>
        <div style={{fontFamily:"var(--font-display)",fontSize:".65rem",letterSpacing:2,color:"var(--text-muted)",marginBottom:14}}>OPSI TAMBAHAN</div>
        <div className="fgroup">
          <label className="flabel">Acak Urutan Soal</label>
          <div className="row" style={{gap:10,marginTop:4}}>
            {[true,false].map(v=>(
              <div key={String(v)} onClick={()=>{const nd={...devConfig,randomAnswers:v};setDevConfig(nd);localStorage.setItem("kaizo:dev",JSON.stringify(nd));applyDevTheme(nd);}}
                style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",textAlign:"center",fontFamily:"var(--font-display)",fontSize:".7rem",fontWeight:700,letterSpacing:1,transition:".2s",
                  background:devConfig.randomAnswers===v||(v===true&&devConfig.randomAnswers===undefined)?"rgba(0,200,255,0.15)":"rgba(0,200,255,0.03)",
                  border:`1px solid ${devConfig.randomAnswers===v||(v===true&&devConfig.randomAnswers===undefined)?"rgba(0,200,255,0.5)":"var(--border-dim)"}`,
                  color:devConfig.randomAnswers===v||(v===true&&devConfig.randomAnswers===undefined)?"var(--neon-blue)":"var(--text-muted)"}}>
                {v?"✓ AKTIF":"✗ NONAKTIF"}
              </div>
            ))}
          </div>
        </div>
        <button className="btn btn-primary btn-full" style={{marginTop:4}} onClick={()=>saveConfig(config,questions)}>💾 Simpan Pengaturan</button>
      </div>
      <div className="card fadein fadein-d1" style={{background:"rgba(176,0,255,0.04)",borderColor:"rgba(176,0,255,0.2)"}}>
        <div className="row" style={{gap:12}}>
          <div style={{fontSize:"1.4rem"}}>🔐</div>
          <div>
            <div style={{fontFamily:"var(--font-display)",fontWeight:700,marginBottom:4,fontSize:".78rem",letterSpacing:1,color:"#c060ff"}}>PANEL ADMIN</div>
            <div style={{fontSize:".82rem",color:"var(--text-secondary)"}}>Akses penuh untuk mengelola soal dan data peserta</div>
          </div>
          <div className="sp"/>
          <button className="btn btn-purple btn-sm" onClick={()=>{setAdminDest("admin");setAdminModal(true);}}>Masuk →</button>
        </div>
      </div>
    </div>
  );

  // ADMIN
  if (screen === "admin") {
    return (
      <div className="wrap fadein">
        <div className="topbar">
          <Logo devConfig={devConfig}/>
          <div className="row" style={{gap:8}}>
            {saveMsg && <span className="badge badge-green">{saveMsg}</span>}
            <button className="btn btn-ghost btn-sm" onClick={()=>setScreen("lobby")}>← Keluar Admin</button>
          </div>
        </div>
        <div className="card" style={{background:"rgba(0,200,255,0.03)",borderColor:"rgba(0,200,255,0.2)",marginBottom:20}}>
          <div className="row">
            <div style={{fontSize:"2rem"}}>⚙️</div>
            <div>
              <div style={{fontFamily:"var(--font-display)",fontWeight:800,fontSize:".9rem",letterSpacing:2,color:"var(--neon-blue)"}}>PANEL ADMIN</div>
              <div style={{fontSize:".78rem",color:"var(--text-muted)"}}>Kelola soal, pengaturan, dan data peserta</div>
            </div>
          </div>
        </div>
        <div className="tabs">
          <button className={`tab${adminTab==="soal"?" on":""}`} onClick={()=>setAdminTab("soal")}>📝 Soal</button>
          <button className={`tab${adminTab==="setting"?" on":""}`} onClick={()=>setAdminTab("setting")}>⚙ Setting</button>
          <button className={`tab${adminTab==="peserta"?" on":""}`} onClick={()=>{setAdminTab("peserta");loadLeaderboard();}}>👥 Peserta</button>
        </div>

        {adminTab==="soal" && (
          <div>
            <div className="row mb20">
              <div><div className="h2">Daftar Soal</div><div style={{fontSize:".75rem",color:"var(--text-muted)"}}>{questions.length} soal tersimpan</div></div>
              <div className="sp"/>
              <button className="btn btn-primary btn-sm" onClick={()=>{
                const nq=[...questions,{text:"Pertanyaan baru...",options:["Opsi A","Opsi B","Opsi C","Opsi D"],answer:0,image:""}];
                setQuestions(nq); saveConfig(config,nq);
              }}>+ Tambah Soal</button>
            </div>
            {questions.map((q,qi)=>(
              <div key={qi} className="qedit">
                <div className="row mb14">
                  <span className="qnum">Soal {qi+1}</span>
                  <div className="sp"/>
                  <button className="btn btn-danger btn-sm" onClick={()=>{
                    const nq=questions.filter((_,i)=>i!==qi); setQuestions(nq); saveConfig(config,nq);
                  }}>Hapus</button>
                </div>
                <div className="fgroup">
                  <label className="flabel">Pertanyaan</label>
                  <textarea className="ftextarea" value={q.text} onChange={e=>{
                    const nq=[...questions]; nq[qi]={...nq[qi],text:e.target.value}; setQuestions(nq);
                  }} onBlur={()=>saveConfig(config,questions)}/>
                </div>
                <div className="fgroup">
                  <label className="flabel">Foto (opsional)</label>
                  <input type="file" accept="image/*" style={{display:"none"}} id={`aimg-${qi}`}
                    onChange={async e=>{
                      const file=e.target.files[0]; if(!file) return;
                      const b64=await toBase64(file);
                      const nq=[...questions]; nq[qi]={...nq[qi],image:b64}; setQuestions(nq); saveConfig(config,nq);
                    }}/>
                  <div className="row" style={{gap:8}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>document.getElementById(`aimg-${qi}`).click()}>📷 Upload Foto</button>
                    {q.image && <button className="btn btn-danger btn-sm" onClick={()=>{
                      const nq=[...questions]; nq[qi]={...nq[qi],image:""}; setQuestions(nq); saveConfig(config,nq);
                    }}>Hapus Foto</button>}
                  </div>
                  {q.image && <img src={q.image} alt="preview" className="imgprev"/>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {["A","B","C","D"].map((lbl,oi)=>(
                    <div key={oi} style={{display:"flex",alignItems:"center",gap:8}}>
                      <div onClick={()=>{const nq=[...questions];nq[qi]={...nq[qi],answer:oi};setQuestions(nq);saveConfig(config,nq);}}
                        style={{width:32,height:32,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-display)",fontSize:".65rem",fontWeight:800,cursor:"pointer",transition:".18s",
                          background:q.answer===oi?"rgba(0,255,157,0.15)":"rgba(0,0,0,0.3)",
                          border:`1px solid ${q.answer===oi?"rgba(0,255,157,0.6)":"var(--border-dim)"}`,
                          color:q.answer===oi?"var(--neon-green)":"var(--text-muted)"}}>
                        {lbl}
                      </div>
                      <input className="finput" style={{padding:"7px 11px",fontSize:".83rem"}} value={q.options[oi]||""} placeholder={`Opsi ${lbl}`}
                        onChange={e=>{const nq=[...questions];nq[qi]={...nq[qi],options:nq[qi].options.map((o,i)=>i===oi?e.target.value:o)};setQuestions(nq);}}
                        onBlur={()=>saveConfig(config,questions)}/>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:8,fontFamily:"var(--font-display)",fontSize:".6rem",letterSpacing:1,color:"var(--text-muted)"}}>
                  JAWABAN BENAR: <strong style={{color:"var(--neon-green)"}}>{["A","B","C","D"][q.answer]}</strong>
                </div>
              </div>
            ))}
            <button className="btn btn-primary btn-full" style={{marginTop:4}} onClick={()=>saveConfig(config,questions)}>💾 Simpan Semua Soal</button>
          </div>
        )}

        {adminTab==="setting" && (
          <div className="card">
            <div className="h2" style={{marginBottom:5}}>Pengaturan Ujian</div>
            <div className="sub">Perubahan langsung berlaku untuk peserta berikutnya.</div>
            <div className="fgroup">
              <label className="flabel">Judul Ujian</label>
              <input className="finput" value={config.title} onChange={e=>setConfig(p=>({...p,title:e.target.value}))} onBlur={()=>saveConfig(config,questions)}/>
            </div>
            <div className="frow">
              <div className="fgroup">
                <label className="flabel">Durasi (menit)</label>
                <input className="finput" type="number" min="1" max="180" value={config.duration}
                  onChange={e=>setConfig(p=>({...p,duration:parseInt(e.target.value)||10}))} onBlur={()=>saveConfig(config,questions)}/>
              </div>
              <div className="fgroup">
                <label className="flabel">Maks. Pelanggaran</label>
                <select className="fselect" value={config.maxViolations} onChange={e=>{const nc={...config,maxViolations:parseInt(e.target.value)};setConfig(nc);saveConfig(nc,questions);}}>
                  <option value="1">1× langsung reset</option>
                  <option value="2">2× baru reset</option>
                  <option value="3">3× baru reset</option>
                </select>
              </div>
            </div>
            <button className="btn btn-primary btn-full" style={{marginTop:4}} onClick={()=>saveConfig(config,questions)}>💾 Simpan Pengaturan</button>
          </div>
        )}

        {adminTab==="peserta" && (
          <div>
            <div className="row mb20">
              <div><div className="h2">Data Peserta</div><div style={{fontSize:".75rem",color:"var(--text-muted)"}}>{leaderboard.length} peserta terdaftar</div></div>
              <div className="sp"/>
              <button className="btn btn-danger btn-sm" onClick={()=>{if(window.confirm("Reset semua data peserta?")) clearLeaderboard();}}>🗑 Reset</button>
              <button className="btn btn-ghost btn-sm" onClick={loadLeaderboard}>↻ Refresh</button>
            </div>
            {lbLoad ? <div className="loading-bar"><span/><span/><span/><span/></div> :
            leaderboard.length === 0 ? <div className="tc muted" style={{padding:"36px 0"}}><div style={{fontSize:"2.5rem",opacity:.4,marginBottom:8}}>📭</div>Belum ada peserta</div> :
            <div className="card" style={{padding:0,overflow:"hidden"}}>
              <table className="adtable">
                <thead><tr>
                  <th>#</th><th>Nama</th><th>Email</th><th>NIM</th><th>Nilai</th><th>Benar</th><th>Viol.</th>
                </tr></thead>
                <tbody>
                  {leaderboard.map((e,i)=>(
                    <tr key={e.email}>
                      <td style={{fontFamily:"var(--font-display)",fontWeight:700,fontSize:".8rem"}}>{i<3?MEDAL[i]:`#${i+1}`}</td>
                      <td style={{fontWeight:600,color:"var(--text-primary)"}}>{e.name}</td>
                      <td style={{color:"var(--text-muted)",fontSize:".82rem"}}>{e.email}</td>
                      <td style={{color:"var(--text-muted)",fontSize:".82rem"}}>{e.nim||"—"}</td>
                      <td><span className="badge badge-blue mono">{e.score}</span></td>
                      <td style={{color:"var(--neon-green)",fontWeight:700,fontFamily:"var(--font-mono)"}}>{e.benar}/{questions.length}</td>
                      <td><span className={`badge ${e.violations>0?"badge-red":"badge-green"}`}>{e.violations}×</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>}
          </div>
        )}
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
