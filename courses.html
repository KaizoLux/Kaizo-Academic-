<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Courses - Kaizo Academic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8FAFC;color:#111}
nav{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-in{max-width:1100px;margin:0 auto;height:60px;display:flex;align-items:center;gap:8px}
.nav-logo{font-weight:800;color:#111;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-box{width:32px;height:32px;background:#2563EB;border-radius:8px;color:#fff;font-weight:800;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:2px;margin-left:10px}
.nav-links a{padding:6px 12px;border-radius:7px;text-decoration:none;font-size:.83rem;font-weight:500;color:#6B7280}
.nav-links a:hover,.nav-links a.active{background:#EFF6FF;color:#2563EB}
.sp{flex:1}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-xs{padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#6B7280;font-family:'Inter',sans-serif;text-decoration:none;display:inline-flex;align-items:center}
.btn-blue{background:#2563EB;color:#fff;border-color:#2563EB}
.avatar{width:32px;height:32px;border-radius:50%;background:#2563EB;color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.wrap{max-width:1100px;margin:0 auto;padding:40px 24px 80px}
.page-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
.page-sub{font-size:.88rem;color:#6B7280;margin-bottom:24px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.fbtn{padding:7px 16px;border-radius:999px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#6B7280;transition:.15s;font-family:'Inter',sans-serif}
.fbtn.active,.fbtn:hover{border-color:#2563EB;color:#2563EB;background:#EFF6FF}
.search{flex:1;min-width:180px;max-width:280px;padding:8px 14px;border:1px solid #E5E7EB;border-radius:999px;font-size:.85rem;outline:none;font-family:'Inter',sans-serif}
.search:focus{border-color:#2563EB}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.09);transform:translateY(-2px)}
.c-thumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#EFF6FF,#F5F3FF)}
.c-body{padding:16px}
.c-cat{font-size:.72rem;font-weight:700;color:#2563EB;text-transform:uppercase;margin-bottom:4px}
.c-title{font-size:.95rem;font-weight:700;color:#111;margin-bottom:8px}
.c-meta{font-size:.78rem;color:#9CA3AF;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.prog-bg{height:6px;background:#F3F4F6;border-radius:999px;overflow:hidden}
.prog-fg{height:6px;background:#2563EB;border-radius:999px;transition:width .4s}
.chip{display:inline-flex;padding:2px 10px;border-radius:999px;font-size:.72rem;font-weight:600}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-head{padding:22px 24px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:12px}
.modal-body{flex:1;overflow-y:auto;padding:22px 24px}
.module{border:1px solid #E5E7EB;border-radius:12px;overflow:hidden;margin-bottom:10px}
.module-head{padding:12px 16px;background:#F8FAFC;display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;font-size:.88rem}
.lesson{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid #E5E7EB;font-size:.84rem;color:#374151;transition:.15s;text-decoration:none}
.lesson:hover{background:#F8FAFC}
.lesson-done{color:#059669}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.nav-links{display:none}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="nav-in">
    <a href="index.html" class="nav-logo"><div class="nav-box">K</div><span>KAIZO ACADEMIC</span></a>
    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="courses.html" class="active">🎓 Courses</a>
      <a href="games.html">🎮 Games</a>
      <a href="community.html">💬 Community</a>
      <a href="leaderboard.html">🏆 Leaderboard</a>
    </div>
    <div class="sp"></div>
    <div class="nav-right" id="nav-right">
      <a href="login.html" class="btn-xs">Masuk</a>
      <a href="register.html" class="btn-xs btn-blue">Daftar</a>
    </div>
  </div>
</nav>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div style="font-size:2rem" id="m-icon"></div>
      <div style="flex:1">
        <div style="font-weight:800;font-size:1rem" id="m-title"></div>
        <div style="font-size:.78rem;color:#9CA3AF" id="m-meta"></div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9CA3AF">✕</button>
    </div>
    <div class="modal-body">
      <div id="m-desc" style="font-size:.88rem;color:#6B7280;margin-bottom:16px;line-height:1.6"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        <span class="chip" style="background:#EFF6FF;color:#2563EB" id="m-xp"></span>
        <span class="chip" style="background:#F0FDF4;color:#059669" id="m-level"></span>
        <span class="chip" style="background:#F5F3FF;color:#7C3AED" id="m-duration"></span>
      </div>
      <div id="m-prog-wrap" style="display:none;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;font-weight:600;color:#374151;margin-bottom:5px"><span>Progress</span><span id="m-prog-pct">0%</span></div>
        <div class="prog-bg"><div class="prog-fg" id="m-prog-bar" style="width:0%"></div></div>
      </div>
      <div id="m-modules"></div>
      <button onclick="startCourse()" style="width:100%;margin-top:16px;padding:12px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif" id="m-start-btn">Mulai Belajar →</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="page-title">🎓 Courses</div>
  <div class="page-sub">Pilih course dan mulai belajar</div>
  <div class="filter-bar">
    <button class="fbtn active" onclick="setFilter('all',this)">Semua</button>
    <button class="fbtn" onclick="setFilter('Ekonomi',this)">📊 Ekonomi</button>
    <button class="fbtn" onclick="setFilter('Matematika',this)">🧮 Matematika</button>
    <button class="fbtn" onclick="setFilter('Bahasa',this)">✍️ Bahasa</button>
    <button class="fbtn" onclick="setFilter('Sains',this)">🔬 Sains</button>
    <input class="search" placeholder="🔍 Cari course..." oninput="renderCourses()" id="search">
  </div>
  <div class="grid" id="course-grid"><div style="text-align:center;padding:40px;color:#9CA3AF">Memuat courses...</div></div>
</div>

<script>
var SB_URL='https://kjcifrrkfpifdrwjufau.supabase.co';
var SB_KEY='sb_publishable_8sk82afIl_YihEiIFkvCwQ_LDz1I5C6';
var sess=null;try{sess=JSON.parse(localStorage.getItem('kaizo:session'));}catch(e){}

// Nav
if(sess){
  var ini=sess.name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
  document.getElementById('nav-right').innerHTML='<span style="font-size:.8rem;font-weight:600;color:#2563EB;background:#EFF6FF;padding:4px 12px;border-radius:999px">⚡ '+(sess.xp||0)+' XP</span><a href="leaderboard.html"><div class="avatar">'+ini+'</div></a><button onclick="logout()" class="btn-xs">Keluar</button>';
}
function logout(){localStorage.removeItem('kaizo:session');location.href='index.html';}

// XP helper
async function addXP(amount, reason){
  if(!sess)return;
  var newXP=(sess.xp||0)+amount;
  try{
    await fetch(SB_URL+'/rest/v1/users?id=eq.'+sess.id,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({xp:newXP})});
    sess.xp=newXP;
    localStorage.setItem('kaizo:session',JSON.stringify(sess));
    toast('⚡ +'+amount+' XP — '+reason+'!');
  }catch(e){}
}

var COURSES=[
  {id:'c1',title:'IPS Ekonomi Dasar',cat:'Ekonomi',icon:'📊',level:'Beginner',duration:'3 jam',xp:200,rating:4.8,students:234,
   desc:'Pelajari dasar-dasar ilmu ekonomi: kelangkaan, permintaan, penawaran, dan sistem perekonomian.',
   modules:[
    {id:'m1',title:'Pengantar Ekonomi',lessons:[
      {id:'l1',title:'Apa itu Ilmu Ekonomi?',type:'text',dur:'10 min'},
      {id:'l2',title:'Kebutuhan vs Keinginan',type:'text',dur:'8 min'},
      {id:'l3',title:'Quiz: Pengantar',type:'quiz',dur:'5 min'}]},
    {id:'m2',title:'Permintaan & Penawaran',lessons:[
      {id:'l4',title:'Hukum Permintaan',type:'text',dur:'12 min'},
      {id:'l5',title:'Hukum Penawaran',type:'text',dur:'12 min'},
      {id:'l6',title:'Quiz: P&P',type:'quiz',dur:'5 min'}]}]},
  {id:'c2',title:'Matematika Kelas 9',cat:'Matematika',icon:'🧮',level:'Beginner',duration:'4 jam',xp:250,rating:4.6,students:189,
   desc:'Kuasai aljabar, geometri, dan statistika dasar kelas 9.',
   modules:[
    {id:'m3',title:'Aljabar',lessons:[
      {id:'l7',title:'Persamaan Linear',type:'text',dur:'15 min'},
      {id:'l8',title:'Sistem Persamaan',type:'text',dur:'15 min'}]},
    {id:'m4',title:'Statistika',lessons:[
      {id:'l9',title:'Mean, Median, Modus',type:'text',dur:'12 min'},
      {id:'l10',title:'Quiz: Statistika',type:'quiz',dur:'5 min'}]}]},
  {id:'c3',title:'Bahasa Indonesia',cat:'Bahasa',icon:'✍️',level:'Beginner',duration:'3 jam',xp:180,rating:4.7,students:210,
   desc:'Kuasai tata bahasa, sastra, dan keterampilan menulis Bahasa Indonesia.',
   modules:[
    {id:'m5',title:'Tata Bahasa',lessons:[
      {id:'l11',title:'Kata Baku & Tidak Baku',type:'text',dur:'10 min'},
      {id:'l12',title:'Ejaan yang Benar',type:'text',dur:'12 min'}]},
    {id:'m6',title:'Sastra',lessons:[
      {id:'l13',title:'Puisi & Prosa',type:'text',dur:'15 min'},
      {id:'l14',title:'Quiz: Sastra',type:'quiz',dur:'5 min'}]}]},
  {id:'c4',title:'IPA Terpadu',cat:'Sains',icon:'🔬',level:'Intermediate',duration:'4 jam',xp:220,rating:4.5,students:156,
   desc:'Pelajari fisika, kimia, dan biologi dasar secara terpadu.',
   modules:[
    {id:'m7',title:'Fisika Dasar',lessons:[
      {id:'l15',title:'Gerak & Gaya',type:'text',dur:'14 min'},
      {id:'l16',title:'Energi & Usaha',type:'text',dur:'14 min'}]},
    {id:'m8',title:'Kimia Dasar',lessons:[
      {id:'l17',title:'Atom & Molekul',type:'text',dur:'12 min'},
      {id:'l18',title:'Quiz: IPA',type:'quiz',dur:'5 min'}]}]}
];

var activeFilter='all';
var activeCourse=null;
var done=[];
// Load completed lessons dari Supabase session
try{
  if(sess&&sess.completed_lessons){
    done=Array.isArray(sess.completed_lessons)?sess.completed_lessons:JSON.parse(sess.completed_lessons||'[]');
  } else {
    done=JSON.parse(localStorage.getItem('kaizo:done')||'[]');
  }
}catch(e){done=[];}

function getProgress(c){
  var all=c.modules.flatMap(function(m){return m.lessons;});
  var d=all.filter(function(l){return done.indexOf(c.id+':'+l.id)>=0;}).length;
  return all.length>0?Math.round(d/all.length*100):0;
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderCourses();
}

function renderCourses(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var list=COURSES.filter(function(c){
    return(activeFilter==='all'||c.cat===activeFilter)&&(!q||c.title.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q));
  });
  if(!list.length){document.getElementById('course-grid').innerHTML='<div style="text-align:center;padding:40px;color:#9CA3AF">Tidak ada course ditemukan.</div>';return;}
  document.getElementById('course-grid').innerHTML=list.map(function(c){
    var p=getProgress(c);
    return'<div class="card" onclick="openCourse(\''+c.id+'\')">'
      +'<div class="c-thumb">'+c.icon+'</div>'
      +'<div class="c-body">'
        +'<div class="c-cat">'+c.cat+'</div>'
        +'<div class="c-title">'+c.title+'</div>'
        +'<div class="c-meta"><span>📖 '+c.modules.flatMap(function(m){return m.lessons;}).length+' lessons</span><span>⚡ +'+c.xp+' XP</span><span>⭐ '+c.rating+'</span></div>'
        +(p>0?'<div class="prog-bg"><div class="prog-fg" style="width:'+p+'%"></div></div><div style="font-size:.72rem;color:#2563EB;font-weight:600;margin-top:4px">'+p+'% selesai</div>':'')
      +'</div></div>';
  }).join('');
}
renderCourses();

function openCourse(id){
  activeCourse=COURSES.find(function(c){return c.id===id;});
  if(!activeCourse)return;
  var c=activeCourse;
  document.getElementById('m-icon').textContent=c.icon;
  document.getElementById('m-title').textContent=c.title;
  document.getElementById('m-meta').textContent=c.cat+' · '+c.level+' · '+c.duration;
  document.getElementById('m-desc').textContent=c.desc;
  document.getElementById('m-xp').textContent='⚡ +'+c.xp+' XP';
  document.getElementById('m-level').textContent=c.level;
  document.getElementById('m-duration').textContent=c.duration;
  var p=getProgress(c);
  if(p>0){document.getElementById('m-prog-wrap').style.display='block';document.getElementById('m-prog-pct').textContent=p+'%';document.getElementById('m-prog-bar').style.width=p+'%';}
  document.getElementById('m-start-btn').textContent=p>0?'Lanjutkan Belajar →':'Mulai Belajar →';
  document.getElementById('m-modules').innerHTML=c.modules.map(function(m){
    return'<div class="module"><div class="module-head">📁 '+m.title+' ('+m.lessons.length+' lessons)</div>'
      +m.lessons.map(function(l){
        var isDone=done.indexOf(c.id+':'+l.id)>=0;
        return'<div class="lesson'+(isDone?' lesson-done':'')+'" onclick="doLesson(\''+c.id+'\',\''+l.id+'\',\''+l.title+'\',\''+l.type+'\')">'
          +(isDone?'✅':'📄')+' '+l.title
          +'<span style="margin-left:auto;font-size:.72rem;color:#9CA3AF">'+l.dur+'</span>'
          +(l.type==='quiz'?'<span style="font-size:.7rem;background:#EFF6FF;color:#2563EB;padding:2px 8px;border-radius:999px;margin-left:6px">Quiz</span>':'')
          +'</div>';
      }).join('')
    +'</div>';
  }).join('');
  document.getElementById('modal').style.display='flex';
}

function doLesson(cid,lid,title,type){
  if(!sess){toast('Login dulu untuk belajar!');return;}
  var key=cid+':'+lid;
  var isNew=done.indexOf(key)<0;
  if(isNew){
    done.push(key);
    localStorage.setItem('kaizo:done',JSON.stringify(done));
    var xpGain=type==='quiz'?20:10;
    // Simpan progress ke Supabase
    if(sess){
      sess.completed_lessons=done;
      localStorage.setItem('kaizo:session',JSON.stringify(sess));
      fetch(SB_URL+'/rest/v1/users?id=eq.'+sess.id,{method:'PATCH',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({completed_lessons:done})
      });
    }
    addXP(xpGain,'Selesai: '+title);
    checkBadges();
  }
  openCourse(cid);
  renderCourses();
}

function startCourse(){
  if(!activeCourse)return;
  if(!sess){toast('Login dulu untuk belajar!');return;}
  var firstLesson=activeCourse.modules[0].lessons[0];
  doLesson(activeCourse.id,firstLesson.id,firstLesson.title,firstLesson.type);
}

function closeModal(){document.getElementById('modal').style.display='none';}

// Badge check
var BADGES=[
  {id:'b1',check:function(){return done.length>=1;}},
  {id:'b3',check:function(){return done.length>=10;}},
];
function checkBadges(){
  if(!sess)return;
  var earned=sess.badges||[];
  var newOnes=[];
  BADGES.forEach(function(b){
    if(earned.indexOf(b.id)<0&&b.check()){earned.push(b.id);newOnes.push(b.id);}
  });
  if(newOnes.length>0){
    sess.badges=earned;
    localStorage.setItem('kaizo:session',JSON.stringify(sess));
    fetch(SB_URL+'/rest/v1/users?id=eq.'+sess.id,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({badges:earned})});
    toast('🏅 Badge baru didapat!');
  }
}

function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);}
</script>
</body>
</html>
