<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar — Kaizo Academic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="shared.js"></script>

<style id="ss"></style>

<style>
body{
display:flex;
min-height:100vh;
background:var(--c-bg2)!important;
font-family:Inter;
}

.auth-wrap{
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

.auth-form{
width:380px;
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.fgroup{margin-bottom:14px}

.flabel{
display:block;
font-size:.85rem;
margin-bottom:6px;
}

.finput{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.btn{
width:100%;
padding:12px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.err-box{
background:#fee;
border:1px solid #faa;
padding:10px;
border-radius:8px;
margin-bottom:10px;
display:none;
color:#b00;
font-size:.85rem;
}
</style>

</head>

<body>

<div class="auth-wrap">

<div class="auth-form">

<h2>Buat Akun</h2>
<p style="font-size:.85rem;color:#666">Bergabung dengan Kaizo Academic</p>

<div class="err-box" id="err-box"></div>

<div class="fgroup">
<label class="flabel">Nama Lengkap</label>
<input class="finput" id="f-name">
</div>

<div class="fgroup">
<label class="flabel">Username</label>
<input class="finput" id="f-username">
</div>

<div class="fgroup">
<label class="flabel">Email</label>
<input class="finput" id="f-email">
</div>

<div class="fgroup">
<label class="flabel">Password</label>
<input class="finput" type="password" id="f-pass">
</div>

<div class="fgroup">
<label class="flabel">Konfirmasi Password</label>
<input class="finput" type="password" id="f-pass2">
</div>

<button class="btn" id="reg-btn" onclick="doRegister()">Daftar</button>

<p style="text-align:center;margin-top:16px;font-size:.85rem">
Sudah punya akun?
<a href="login.html">Masuk di sini</a>
</p>

</div>

</div>

<script>

document.getElementById('ss').textContent = SHARED_CSS;

Theme.init();

if(Auth.isLoggedIn()){
window.location.href="index.html";
}

function showErr(msg){
const e=document.getElementById("err-box");
e.textContent=msg;
e.style.display="block";
}

function doRegister(){

const name=document.getElementById("f-name").value.trim();
const username=document.getElementById("f-username").value.trim();
const email=document.getElementById("f-email").value.trim();
const pass=document.getElementById("f-pass").value;
const pass2=document.getElementById("f-pass2").value;

if(!name || !username || !email || !pass){
showErr("Semua kolom wajib diisi.");
return;
}

if(pass.length<6){
showErr("Password minimal 6 karakter.");
return;
}

if(pass!==pass2){
showErr("Password tidak cocok.");
return;
}

const btn=document.getElementById("reg-btn");
btn.disabled=true;
btn.textContent="Mendaftarkan...";

setTimeout(()=>{

const res=Auth.register(name,email,pass);

if(res.ok){

/* tambahkan username ke user */
res.user.username=username;

let users=Auth.getUsers();
users=users.map(u=>{
if(u.id===res.user.id){
u.username=username;
}
return u;
});

localStorage.setItem("kaizo:users",JSON.stringify(users));

alert("Akun berhasil dibuat!");

window.location.href="index.html";

}else{

showErr(res.msg);

btn.disabled=false;
btn.textContent="Daftar";

}

},400);

}

</script>

</body>
</html>
