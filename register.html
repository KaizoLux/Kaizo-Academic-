<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar — Kaizo Academic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.box{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
h2{font-size:1.4rem;font-weight:800;color:#111;margin-bottom:4px}
.sub{font-size:.85rem;color:#666;margin-bottom:20px}
.note{background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:.82rem;color:#78350f;margin-bottom:14px;display:none}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:.82rem;color:#dc2626;margin-bottom:10px;display:none}
.suc{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:10px 12px;font-size:.82rem;color:#065f46;margin-bottom:10px;display:none}
label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-top:12px;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:.9rem;color:#111;outline:none;font-family:sans-serif}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
button{width:100%;margin-top:18px;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:sans-serif}
button:disabled{opacity:.5;cursor:not-allowed}
.foot{text-align:center;margin-top:14px;font-size:.83rem;color:#666}
.foot a{color:#2563eb;font-weight:600;text-decoration:none}
.logbox{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:8px 10px;font-size:.7rem;color:#6b7280;margin-top:10px;display:none;word-break:break-all;line-height:1.8;font-family:monospace}
</style>
</head>
<body>
<div class="box">
  <h2>Buat Akun</h2>
  <div class="sub">Bergabung dengan Kaizo Academic</div>
  <div class="note" id="note">&#128081; Pengguna pertama otomatis jadi Developer Owner!</div>
  <div class="err" id="err"></div>
  <div class="suc" id="suc"></div>
  <label>Nama Lengkap</label>
  <input id="nm" placeholder="Nama kamu" autocomplete="name">
  <label>Email</label>
  <input id="em" type="email" placeholder="email@kamu.com" autocomplete="email">
  <label>Password</label>
  <input id="pw" type="password" placeholder="Minimal 6 karakter" autocomplete="new-password">
  <label>Konfirmasi Password</label>
  <input id="pw2" type="password" placeholder="Ulangi password" autocomplete="new-password">
  <button id="btn" onclick="daftar()">Daftar Sekarang</button>
  <div class="foot">Sudah punya akun? <a href="login.html">Masuk di sini</a></div>
  <div class="logbox" id="logbox"></div>
</div>
<script>
var LOG = document.getElementById('logbox');
function log(s) { LOG.style.display='block'; LOG.innerHTML += s + '<br>'; }
function showErr(s) { var e=document.getElementById('err'); e.textContent=s; e.style.display='block'; document.getElementById('suc').style.display='none'; }
function showSuc(s) { var e=document.getElementById('suc'); e.textContent=s; e.style.display='block'; document.getElementById('err').style.display='none'; }
function clr() { document.getElementById('err').style.display='none'; document.getElementById('suc').style.display='none'; }

// Test localStorage
try {
  localStorage.setItem('kaizo:_test', '1');
  localStorage.removeItem('kaizo:_test');
  log('Storage: OK');
} catch(e) {
  log('Storage ERROR: ' + e.message);
  showErr('Browser tidak support localStorage. Coba browser lain atau nonaktifkan mode privat.');
}

// Redirect jika sudah login
try {
  if (localStorage.getItem('kaizo:session')) {
    log('Sudah login, redirect ke index...');
    window.location.href = 'index.html';
  }
} catch(e) { log('Cek session error: ' + e.message); }

// Tampilkan badge owner jika user pertama
try {
  var existingUsers = JSON.parse(localStorage.getItem('kaizo:users') || '[]');
  log('Jumlah user: ' + existingUsers.length);
  if (existingUsers.length === 0) document.getElementById('note').style.display = 'block';
} catch(e) { log('Cek users error: ' + e.message); }

// Hash password
function hashPw(s) {
  var h = 5381;
  for (var i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  return 'kz_' + (h >>> 0).toString(16);
}

// Listener enter
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') daftar(); });

function daftar() {
  clr();
  var nm  = document.getElementById('nm').value.trim();
  var em  = document.getElementById('em').value.trim().toLowerCase();
  var pw  = document.getElementById('pw').value;
  var pw2 = document.getElementById('pw2').value;
  var btn = document.getElementById('btn');

  log('Submit: nm=' + nm + ' em=' + em + ' pw.len=' + pw.length);

  if (!nm)             { showErr('Nama wajib diisi!'); return; }
  if (!em)             { showErr('Email wajib diisi!'); return; }
  if (em.indexOf('@') < 0) { showErr('Format email tidak valid!'); return; }
  if (pw.length < 6)   { showErr('Password minimal 6 karakter!'); return; }
  if (pw !== pw2)      { showErr('Konfirmasi password tidak cocok!'); return; }

  btn.disabled = true;
  btn.textContent = 'Memproses...';

  setTimeout(function() {
    try {
      var users = JSON.parse(localStorage.getItem('kaizo:users') || '[]');
      log('Users di storage: ' + users.length);

      // Cek duplikat email
      for (var i = 0; i < users.length; i++) {
        if (users[i].email === em) {
          showErr('Email sudah digunakan!');
          btn.disabled = false;
          btn.textContent = 'Daftar Sekarang';
          return;
        }
      }

      // Buat user baru
      var isFirst = (users.length === 0);
      var user = {
        id: 'u' + Date.now(),
        name: nm,
        email: em,
        password: hashPw(pw),
        role: isFirst ? 'owner' : 'user',
        xp: 0,
        badges: [],
        completedLessons: [],
        completedCourses: [],
        quizResults: [],
        gamesPlayed: 0,
        posts: 0,
        joinDate: new Date().toISOString(),
        avatar: ''
      };

      log('User dibuat: ' + JSON.stringify({id: user.id, role: user.role}));

      users.push(user);
      localStorage.setItem('kaizo:users', JSON.stringify(users));
      log('Users tersimpan: ' + users.length);

      // Simpan sesi
      var sess = JSON.parse(JSON.stringify(user));
      delete sess.password;
      localStorage.setItem('kaizo:session', JSON.stringify(sess));
      log('Session tersimpan, redirect...');

      showSuc('Berhasil! Mengalihkan ke beranda...');

      setTimeout(function() {
        window.location.href = 'index.html';
      }, 1200);

    } catch(e) {
      log('ERROR: ' + e.message);
      showErr('Error: ' + e.message);
      btn.disabled = false;
      btn.textContent = 'Daftar Sekarang';
    }
  }, 300);
}
</script>
</body>
</html>
