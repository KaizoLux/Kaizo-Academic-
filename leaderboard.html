<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leaderboard - Kaizo Academic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#111}
nav{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;position:sticky;top:0;z-index:10}
.nav-in{max-width:1000px;margin:0 auto;height:60px;display:flex;align-items:center;gap:8px}
.nav-logo{font-weight:800;color:#111;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo-box{width:32px;height:32px;background:#2563EB;border-radius:8px;color:#fff;font-weight:800;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.sp{flex:1}
.nav-links{display:flex;gap:2px}
.nav-links a{padding:6px 12px;border-radius:7px;text-decoration:none;font-size:.83rem;font-weight:500;color:#6B7280}
.nav-links a:hover{background:#F3F4F6;color:#111}
.wrap{max-width:700px;margin:0 auto;padding:40px 20px 80px}
.hero{text-align:center;margin-bottom:32px}
.hero h1{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.hero p{color:#777;font-size:.9rem}
.tabs{display:flex;gap:4px;background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:9px;border:none;background:transparent;border-radius:9px;font-size:.83rem;font-weight:600;color:#6B7280;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.tab.active{background:#2563EB;color:#fff}
.panel{display:none}
.panel.active{display:block}
/* LEADERBOARD */
.lb-row{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.lb-row.me{border-color:#2563EB;background:#EFF6FF}
.lb-rank{font-size:1.2rem;font-weight:800;color:#9CA3AF;width:32px;text-align:center;flex-shrink:0}
.lb-rank.gold{color:#F59E0B}
.lb-rank.silver{color:#9CA3AF}
.lb-rank.bronze{color:#CD7C2F}
.avatar{width:40px;height:40px;border-radius:50%;background:#2563EB;color:#fff;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb-name{font-weight:700;font-size:.92rem;color:#111}
.lb-sub{font-size:.75rem;color:#9CA3AF;margin-top:2px}
.lb-xp{margin-left:auto;font-weight:800;color:#2563EB;font-size:.95rem}
.lb-xp span{font-size:.72rem;font-weight:500;color:#9CA3AF}
/* PROFILE */
.prof-card{background:linear-gradient(135deg,#1D4ED8,#7C3AED);border-radius:16px;padding:28px;color:#fff;margin-bottom:20px;text-align:center}
.prof-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:1.5rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.xp-bar{background:rgba(255,255,255,.2);border-radius:999px;height:8px;margin:12px 0 4px}
.xp-fill{background:#fff;border-radius:999px;height:8px}
.role-chip{display:inline-block;background:rgba(255,255,255,.2);border-radius:999px;padding:3px 12px;font-size:.75rem;font-weight:600;margin-top:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.info-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px;text-align:center}
.info-v{font-size:1.4rem;font-weight:800;color:#2563EB}
.info-l{font-size:.75rem;color:#9CA3AF;margin-top:2px}
/* LOADING */
.loading{text-align:center;padding:32px;color:#9CA3AF;font-size:.9rem}
.empty{text-align:center;padding:32px;color:#9CA3AF}
</style>
</head>
<body>
<nav>
  <div class="nav-in">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-box">K</div>
      <span>KAIZO ACADEMIC</span>
    </a>
    <div class="sp"></div>
    <div class="nav-links">
      <a href="index.html">🏠</a>
      <a href="courses.html">🎓</a>
      <a href="games.html">🎮</a>
      <a href="community.html">💬</a>
      <a href="leaderboard.html">🏆</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="hero">
    <h1>🏆 Leaderboard</h1>
    <p>Ranking semua siswa berdasarkan XP</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('lb')">🏆 Ranking</button>
    <button class="tab" onclick="switchTab('prof')">👤 Profil Saya</button>
  </div>

  <!-- LEADERBOARD TAB -->
  <div class="panel active" id="tab-lb">
    <div class="loading" id="lb-loading">⏳ Memuat data...</div>
    <div id="lb-list"></div>
  </div>

  <!-- PROFILE TAB -->
  <div class="panel" id="tab-prof">
    <div id="prof-content">
      <div class="empty">Silakan <a href="login.html" style="color:#2563EB;font-weight:600">masuk</a> untuk melihat profil.</div>
    </div>
  </div>
</div>

<script>
var SB_URL='https://kjcifrrkfpifdrwjufau.supabase.co';
var SB_KEY='sb_publishable_8sk82afIl_YihEiIFkvCwQ_LDz1I5C6';

async function sbGet(path){
  var r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.json();
}

function initials(n){return(n||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}

var sess=null;
try{sess=JSON.parse(localStorage.getItem('kaizo:session'));}catch(e){}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['lb','prof'][i]===t);});
  document.querySelectorAll('.panel').forEach(function(el,i){el.classList.toggle('active',['tab-lb','tab-prof'][i]==='tab-'+t);});
}

// Load leaderboard
(async function(){
  try{
    var users=await sbGet('users?select=id,name,xp,role,badges,completed_courses&order=xp.desc&limit=50');
    document.getElementById('lb-loading').style.display='none';

    if(!users||users.length===0){
      document.getElementById('lb-list').innerHTML='<div class="empty">Belum ada siswa terdaftar.</div>';
      return;
    }

    var medals=['🥇','🥈','🥉'];
    var rankClass=['gold','silver','bronze'];
    document.getElementById('lb-list').innerHTML=users.map(function(u,i){
      var isMe=sess&&sess.id===u.id;
      var rank=i<3?medals[i]:''+(i+1);
      var rc=i<3?rankClass[i]:'';
      return '<div class="lb-row'+(isMe?' me':'')+'">'+
        '<div class="lb-rank '+rc+'">'+rank+'</div>'+
        '<div class="avatar">'+initials(u.name)+'</div>'+
        '<div><div class="lb-name">'+u.name+(isMe?' <span style="font-size:.72rem;background:#2563EB;color:#fff;border-radius:999px;padding:1px 8px">Kamu</span>':'')+'</div>'+
        '<div class="lb-sub">Level '+(getLevel(u.xp||0))+' · '+(u.badges||[]).length+' badges</div></div>'+
        '<div class="lb-xp">'+(u.xp||0)+' <span>XP</span></div>'+
      '</div>';
    }).join('');
  }catch(e){
    document.getElementById('lb-loading').innerHTML='⚠️ Gagal memuat: '+e.message;
  }
})();

function getLevel(xp){
  if(xp>=4000)return 6;if(xp>=2000)return 5;if(xp>=1000)return 4;
  if(xp>=500)return 3;if(xp>=200)return 2;return 1;
}
function getLevelName(xp){
  var names=['','Novice','Learner','Scholar','Expert','Master','Legend'];
  return names[getLevel(xp)]||'Novice';
}

// Load profile
if(sess){
  (async function(){
    try{
      var users=await sbGet('users?id=eq.'+sess.id+'&select=*');
      var u=users&&users[0]?users[0]:sess;
      var xp=u.xp||0;
      var lv=getLevel(xp);
      var ln=getLevelName(xp);
      var maxXP=[0,200,500,1000,2000,4000,9999];
      var minXP=[0,0,200,500,1000,2000,4000];
      var pct=Math.min(100,Math.round((xp-minXP[lv])/(maxXP[lv]-minXP[lv])*100));

      var roles={owner:'👑 Developer Owner',developer:'🛠 Developer',creator:'✏️ Creator',user:'🎓 User',guest:'👤 Guest'};

      document.getElementById('prof-content').innerHTML=
        '<div class="prof-card">'+
          '<div class="prof-av">'+initials(u.name)+'</div>'+
          '<div style="font-size:1.2rem;font-weight:800">'+u.name+'</div>'+
          '<div style="font-size:.85rem;opacity:.8;margin-top:2px">'+u.email+'</div>'+
          '<div class="role-chip">'+(roles[u.role]||u.role)+'</div>'+
          '<div class="xp-bar"><div class="xp-fill" style="width:'+pct+'%"></div></div>'+
          '<div style="display:flex;justify-content:space-between;font-size:.75rem;opacity:.7"><span>'+xp+' XP</span><span>Level '+lv+' - '+ln+'</span></div>'+
        '</div>'+
        '<div class="info-grid">'+
          '<div class="info-card"><div class="info-v">'+xp+'</div><div class="info-l">Total XP</div></div>'+
          '<div class="info-card"><div class="info-v">'+lv+'</div><div class="info-l">Level</div></div>'+
          '<div class="info-card"><div class="info-v">'+((u.completed_lessons||[]).length||0)+'</div><div class="info-l">Lessons Selesai</div></div>'+
          '<div class="info-card"><div class="info-v">'+((u.badges||[]).length||0)+'</div><div class="info-l">Badges</div></div>'+
        '</div>'+
        '<div style="text-align:center"><button onclick="logout()" style="padding:10px 24px;border:1px solid #fecaca;background:#fef2f2;color:#dc2626;border-radius:8px;font-weight:600;cursor:pointer;font-family:sans-serif">Keluar</button></div>';
    }catch(e){
      document.getElementById('prof-content').innerHTML='<div class="empty">Gagal memuat profil.</div>';
    }
  })();
}

function logout(){localStorage.removeItem('kaizo:session');location.href='index.html';}
</script>
</body>
</html>
