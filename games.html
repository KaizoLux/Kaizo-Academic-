<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Hub - Kaizo Academic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8FAFC;color:#111}
nav{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-in{max-width:1100px;margin:0 auto;height:60px;display:flex;align-items:center;gap:8px}
.nav-logo{font-weight:800;color:#111;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-box{width:32px;height:32px;background:#2563EB;border-radius:8px;color:#fff;font-weight:800;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:2px;margin-left:10px}
.nav-links a{padding:6px 12px;border-radius:7px;text-decoration:none;font-size:.83rem;font-weight:500;color:#6B7280}
.nav-links a:hover,.nav-links a.active{background:#EFF6FF;color:#2563EB}
.sp{flex:1}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-xs{padding:6px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#6B7280;font-family:'Inter',sans-serif;text-decoration:none;display:inline-flex;align-items:center}
.btn-blue{background:#2563EB;color:#fff;border-color:#2563EB}
.avatar{width:32px;height:32px;border-radius:50%;background:#2563EB;color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center}
/* HERO */
.hero{background:linear-gradient(135deg,#1D4ED8,#7C3AED);color:#fff;padding:40px 24px;text-align:center}
.hero h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.hero p{opacity:.8;font-size:.9rem;max-width:420px;margin:0 auto}
/* GRID */
.wrap{max-width:1100px;margin:0 auto;padding:36px 24px 80px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.fbtn{padding:7px 16px;border-radius:999px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#6B7280;transition:.15s;font-family:'Inter',sans-serif}
.fbtn.active,.fbtn:hover{border-color:#2563EB;color:#2563EB;background:#EFF6FF}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.gc{background:#fff;border:1px solid #E5E7EB;border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s}
.gc:hover{box-shadow:0 8px 24px rgba(0,0,0,.09);transform:translateY(-3px)}
.gc-top{height:100px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative}
.gc-bar{position:absolute;top:0;left:0;right:0;height:4px}
.gc-body{padding:16px}
.gc-name{font-size:.95rem;font-weight:700;margin-bottom:4px}
.gc-desc{font-size:.8rem;color:#9CA3AF;line-height:1.5;margin-bottom:10px}
.chip{display:inline-flex;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:600}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-head{padding:20px 24px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:12px}
.modal-body{flex:1;overflow-y:auto;padding:24px}
/* GAME STYLES */
.q-opt{width:100%;padding:12px 16px;border:2px solid #E5E7EB;border-radius:12px;background:#fff;cursor:pointer;font-size:.9rem;text-align:left;transition:.15s;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-family:'Inter',sans-serif;color:#111}
.q-opt:hover{border-color:#2563EB;background:#EFF6FF}
.q-opt.cor{border-color:#059669;background:#ECFDF5;color:#059669}
.q-opt.wrg{border-color:#DC2626;background:#FEF2F2;color:#DC2626}
.q-opt.sel{border-color:#2563EB;background:#EFF6FF}
.fc-card{height:180px;cursor:pointer;perspective:600px}
.fc-inner{width:100%;height:100%;transition:.5s;transform-style:preserve-3d;position:relative}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;backface-visibility:hidden}
.fc-front{background:linear-gradient(135deg,#1D4ED8,#7C3AED);color:#fff;font-size:1.1rem;font-weight:700}
.fc-back{background:#F8FAFC;border:2px solid #E5E7EB;font-size:.9rem;line-height:1.6;transform:rotateY(180deg)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mem-card{height:72px;border-radius:10px;border:2px solid #E5E7EB;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:#F8FAFC;transition:.2s;user-select:none}
.mem-card.flip{background:#2563EB;border-color:#2563EB;transform:scale(1.05)}
.mem-card.match{background:#ECFDF5;border-color:#059669;opacity:.7}
.result-box{text-align:center;padding:20px 0}
.toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.nav-links{display:none}.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav>
  <div class="nav-in">
    <a href="index.html" class="nav-logo"><div class="nav-box">K</div><span>KAIZO ACADEMIC</span></a>
    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="courses.html">🎓 Courses</a>
      <a href="games.html" class="active">🎮 Games</a>
      <a href="community.html">💬 Community</a>
      <a href="leaderboard.html">🏆 Leaderboard</a>
    </div>
    <div class="sp"></div>
    <div class="nav-right" id="nav-right">
      <a href="login.html" class="btn-xs">Masuk</a>
      <a href="register.html" class="btn-xs btn-blue">Daftar</a>
    </div>
  </div>
</nav>
<div class="hero"><h1>🎮 Game Hub</h1><p>10 game edukatif seru! Setiap game memberikan XP.</p></div>
<div class="overlay" id="gmodal" style="display:none" onclick="if(event.target===this)closeGame()">
  <div class="modal">
    <div class="modal-head">
      <div style="font-size:1.8rem" id="gm-icon"></div>
      <div style="flex:1"><div style="font-weight:800" id="gm-title"></div><div style="font-size:.78rem;color:#9CA3AF" id="gm-desc"></div></div>
      <button onclick="closeGame()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9CA3AF">✕</button>
    </div>
    <div class="modal-body" id="gm-body"></div>
  </div>
</div>
<div class="wrap">
  <div class="filter-bar">
    <button class="fbtn active" onclick="setF('all',this)">Semua</button>
    <button class="fbtn" onclick="setF('quiz',this)">Quiz</button>
    <button class="fbtn" onclick="setF('memory',this)">Memory</button>
    <button class="fbtn" onclick="setF('word',this)">Word</button>
    <button class="fbtn" onclick="setF('challenge',this)">Challenge</button>
  </div>
  <div class="grid" id="gg"></div>
</div>
<script>
var SB_URL='https://kjcifrrkfpifdrwjufau.supabase.co';
var SB_KEY='sb_publishable_8sk82afIl_YihEiIFkvCwQ_LDz1I5C6';
var sess=null;try{sess=JSON.parse(localStorage.getItem('kaizo:session'));}catch(e){}

if(sess){
  var ini=sess.name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
  document.getElementById('nav-right').innerHTML='<span style="font-size:.8rem;font-weight:600;color:#2563EB;background:#EFF6FF;padding:4px 12px;border-radius:999px">⚡ '+(sess.xp||0)+' XP</span><a href="leaderboard.html"><div class="avatar">'+ini+'</div></a><button onclick="logout()" class="btn-xs">Keluar</button>';
}
function logout(){localStorage.removeItem('kaizo:session');location.href='index.html';}

// Award XP to Supabase
async function awardXP(amount, gameName){
  if(!sess){toast('Login untuk dapat XP!');return;}
  var newXP=(sess.xp||0)+amount;
  try{
    await fetch(SB_URL+'/rest/v1/users?id=eq.'+sess.id,{method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({xp:newXP,games_played:(sess.games_played||0)+1})});
    sess.xp=newXP;sess.games_played=(sess.games_played||0)+1;
    localStorage.setItem('kaizo:session',JSON.stringify(sess));
    // Update XP display
    var pill=document.querySelector('.nav-right span');
    if(pill)pill.textContent='⚡ '+newXP+' XP';
  }catch(e){}
  toast('⚡ +'+amount+' XP dari '+gameName+'!');
  checkBadges();
}

// Badge check
var BADGE_DEFS=[
  {id:'b2',label:'Quiz Taker',check:function(){return(sess.games_played||0)>=1;}},
  {id:'b6',label:'Gamer',check:function(){return(sess.games_played||0)>=5;}},
];
function checkBadges(){
  if(!sess)return;
  var earned=sess.badges||[];
  var newOnes=[];
  BADGE_DEFS.forEach(function(b){
    if(earned.indexOf(b.id)<0&&b.check()){earned.push(b.id);newOnes.push(b.label);}
  });
  if(newOnes.length>0){
    sess.badges=earned;localStorage.setItem('kaizo:session',JSON.stringify(sess));
    fetch(SB_URL+'/rest/v1/users?id=eq.'+sess.id,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({badges:earned})});
    setTimeout(function(){toast('🏅 Badge baru: '+newOnes.join(', ')+'!');},1500);
  }
}

var GAMES=[
  {id:'quiz',    name:'Quiz Arena',      icon:'⚡',color:'#2563EB',cat:'quiz',    xp:30, desc:'10 soal berwaktu, jawab cepat!'},
  {id:'speed',   name:'Speed Quiz',      icon:'🚀',color:'#D97706',cat:'quiz',    xp:25, desc:'60 detik, jawab sebanyak mungkin!'},
  {id:'tf',      name:'True or False',   icon:'✅',color:'#0891B2',cat:'quiz',    xp:15, desc:'Benar atau salah? Jawab cepat!'},
  {id:'flash',   name:'Flashcard',       icon:'🃏',color:'#7C3AED',cat:'memory',  xp:15, desc:'Flip kartu, hafal konsep penting.'},
  {id:'memory',  name:'Memory Match',    icon:'🧠',color:'#059669',cat:'memory',  xp:20, desc:'Cocokkan pasangan yang tersembunyi.'},
  {id:'word',    name:'Word Builder',    icon:'🔤',color:'#DC2626',cat:'word',    xp:20, desc:'Susun huruf menjadi kata yang benar.'},
  {id:'seq',     name:'Sequence Master', icon:'📋',color:'#7C3AED',cat:'challenge',xp:25,desc:'Urutkan langkah dengan benar.'},
  {id:'logic',   name:'Logic Grid',      icon:'🔲',color:'#059669',cat:'challenge',xp:35,desc:'Isi grid 4x4 seperti Sudoku.'},
  {id:'race',    name:'Knowledge Race',  icon:'🏁',color:'#D97706',cat:'challenge',xp:40,desc:'3 level, 3 nyawa — seberapa jauh?'},
  {id:'puzzle',  name:'Puzzle Builder',  icon:'🧩',color:'#2563EB',cat:'memory',  xp:20,desc:'Susun potongan menjadi konsep lengkap.'},
];

var activeF='all';
function setF(f,btn){
  activeF=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderGames();
}
function renderGames(){
  var list=activeF==='all'?GAMES:GAMES.filter(function(g){return g.cat===activeF;});
  document.getElementById('gg').innerHTML=list.map(function(g){
    return'<div class="gc" onclick="openGame(\''+g.id+'\')"><div class="gc-top" style="background:'+g.color+'18"><div class="gc-bar" style="background:'+g.color+'"></div>'+g.icon+'</div><div class="gc-body"><div class="gc-name">'+g.name+'</div><div class="gc-desc">'+g.desc+'</div><span class="chip" style="background:'+g.color+'18;color:'+g.color+'">⚡ +'+g.xp+' XP</span></div></div>';
  }).join('');
}
renderGames();

var curGame=null;
function openGame(id){
  curGame=GAMES.find(function(g){return g.id===id;});
  if(!curGame)return;
  document.getElementById('gm-icon').textContent=curGame.icon;
  document.getElementById('gm-title').textContent=curGame.name;
  document.getElementById('gm-desc').textContent=curGame.desc;
  document.getElementById('gmodal').style.display='flex';
  var body=document.getElementById('gm-body');
  body.innerHTML='<div style="text-align:center;padding:32px;color:#9CA3AF">⏳ Memuat...</div>';
  setTimeout(function(){loadGame(id,body);},200);
}
function closeGame(){document.getElementById('gmodal').style.display='none';curGame=null;}

function gameResult(body,score,correct,total,xp,gname){
  body.innerHTML='<div class="result-box">'
    +'<div style="font-size:3.5rem;margin-bottom:12px">'+(score>=80?'🏆':score>=50?'🎯':'💪')+'</div>'
    +'<div style="font-size:2.2rem;font-weight:800;color:'+(score>=70?'#059669':score>=40?'#D97706':'#DC2626')+'">'+score+'</div>'
    +'<div style="font-size:.85rem;color:#9CA3AF;margin-bottom:16px">'+correct+'/'+total+' benar</div>'
    +'<div style="display:inline-flex;align-items:center;gap:8px;background:#FFFBEB;border:1px solid #FCD34D;border-radius:999px;padding:8px 20px;font-weight:700;color:#D97706;margin-bottom:20px">⚡ +'+xp+' XP Didapat</div>'
    +'<div style="display:flex;gap:10px;justify-content:center">'
    +'<button onclick="closeGame()" style="padding:10px 20px;background:#F3F4F6;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Selesai</button>'
    +'<button onclick="openGame(\''+curGame.id+'\')" style="padding:10px 20px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Main Lagi</button>'
    +'</div></div>';
  awardXP(xp,gname);
}

// ── QUIZ DATA ──
var QS=[
  {q:"Hukum permintaan: jika harga naik maka...",opts:["Permintaan naik","Permintaan turun","Penawaran turun","Tidak berubah"],a:1},
  {q:"Mean dari 2,4,6,8,10 adalah...",opts:["5","6","7","8"],a:1},
  {q:"Rumus luas lingkaran adalah...",opts:["πr","2πr","πr²","2πr²"],a:2},
  {q:"Fotosintesis menghasilkan...",opts:["CO₂ dan H₂O","O₂ dan glukosa","N₂ dan protein","H₂ dan oksida"],a:1},
  {q:"Ibu kota Indonesia adalah...",opts:["Surabaya","Bandung","Jakarta","Medan"],a:2},
  {q:"Nilai π (pi) mendekati...",opts:["2.14","3.14","4.14","1.14"],a:1},
  {q:"Kata baku dari 'aktifitas' adalah...",opts:["aktifitas","aktivitas","aktivity","aktifiti"],a:1},
  {q:"Perang Dunia II berakhir tahun...",opts:["1943","1944","1945","1946"],a:2},
  {q:"H₂O adalah rumus kimia...",opts:["Hidrogen","Oksigen","Air","Garam"],a:2},
  {q:"1 km = ... meter",opts:["10","100","1000","10000"],a:2},
  {q:"Proklamasi Indonesia tanggal...",opts:["16 Agustus 1945","17 Agustus 1945","18 Agustus 1945","17 Juli 1945"],a:1},
  {q:"Planet terbesar di tata surya...",opts:["Saturnus","Mars","Jupiter","Uranus"],a:2},
];

// ── LOAD GAME ──
function loadGame(id,body){
  if(id==='quiz')loadQuiz(body);
  else if(id==='speed')loadSpeed(body);
  else if(id==='tf')loadTF(body);
  else if(id==='flash')loadFlash(body);
  else if(id==='memory')loadMemory(body);
  else if(id==='word')loadWord(body);
  else if(id==='seq')loadSeq(body);
  else if(id==='logic')loadLogic(body);
  else if(id==='race')loadRace(body);
  else if(id==='puzzle')loadPuzzle(body);
}

// ── QUIZ ARENA ──
function loadQuiz(body){
  var qs=[...QS].sort(function(){return Math.random()-.5;}).slice(0,10);
  var cur=0,correct=0,tl=20,timer=null,answered=false;
  function render(){
    var q=qs[cur];
    body.innerHTML='<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:.82rem;font-weight:600;color:#9CA3AF">'+( cur+1)+'/'+qs.length+'</span><span style="font-size:1.2rem;font-weight:800;color:'+(tl<=5?'#DC2626':'#2563EB')+'">⏱ '+tl+'s</span></div>'
      +'<div style="font-weight:700;font-size:.95rem;margin-bottom:16px;line-height:1.5">'+q.q+'</div>'
      +q.opts.map(function(o,i){return'<button class="q-opt" onclick="pick('+i+')"><span style="width:24px;height:24px;border-radius:6px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0">'+'ABCD'[i]+'</span>'+o+'</button>';}).join('')+'</div>';
  }
  function pick(i){
    if(answered)return;answered=true;clearInterval(timer);
    var q=qs[cur];
    var opts=body.querySelectorAll('.q-opt');
    opts[q.a].classList.add('cor');
    if(i!==q.a)opts[i].classList.add('wrg');else correct++;
    setTimeout(function(){cur++;answered=false;if(cur>=qs.length){var s=Math.round(correct/qs.length*100);gameResult(body,s,correct,qs.length,Math.round(curGame.xp*s/100),curGame.name);}else{tl=20;render();startT();}},900);
  }
  function startT(){clearInterval(timer);timer=setInterval(function(){tl--;if(tl<=0){clearInterval(timer);pick(-1);}else render();},1000);}
  window.pick=pick;
  render();startT();
}

// ── SPEED QUIZ ──
function loadSpeed(body){
  var qs=[...QS].sort(function(){return Math.random()-.5;});
  var cur=0,correct=0,total=0,tl=60,timer=null;
  function render(){
    if(cur>=qs.length)cur=0;
    var q=qs[cur];
    body.innerHTML='<div style="text-align:center;margin-bottom:8px"><span style="font-size:1.4rem;font-weight:800;color:'+(tl<=10?'#DC2626':'#2563EB')+'">⏱ '+tl+'s</span></div>'
      +'<div style="font-weight:700;font-size:.95rem;margin-bottom:14px;line-height:1.5">'+q.q+'</div>'
      +q.opts.map(function(o,i){return'<button class="q-opt" onclick="spick('+i+')"><span style="width:24px;height:24px;border-radius:6px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0">'+'ABCD'[i]+'</span>'+o+'</button>';}).join('');
  }
  function spick(i){
    total++;if(i===qs[cur].a)correct++;
    cur++;render();
  }
  timer=setInterval(function(){tl--;if(tl<=0){clearInterval(timer);var s=total>0?Math.round(correct/total*100):0;gameResult(body,s,correct,total,Math.round(curGame.xp*Math.min(s,100)/100),curGame.name);}else render();},1000);
  window.spick=spick;
  render();
}

// ── TRUE FALSE ──
function loadTF(body){
  var stmts=[
    {s:"Air mendidih pada suhu 100°C",a:true},
    {s:"Jakarta adalah ibu kota Indonesia",a:true},
    {s:"Matahari mengelilingi bumi",a:false},
    {s:"1 kg = 100 gram",a:false},
    {s:"Fotosintesis membutuhkan cahaya matahari",a:true},
    {s:"Indonesia merdeka tahun 1945",a:true},
    {s:"Segitiga memiliki 4 sudut",a:false},
    {s:"H₂O adalah rumus kimia air",a:true},
  ];
  var cur=0,correct=0;
  function render(){
    var s=stmts[cur];
    body.innerHTML='<div style="text-align:center"><div style="font-size:.8rem;font-weight:600;color:#9CA3AF;margin-bottom:12px">'+(cur+1)+'/'+stmts.length+'</div>'
      +'<div style="font-size:1rem;font-weight:700;line-height:1.6;margin-bottom:28px;padding:0 8px">'+s.s+'</div>'
      +'<div style="display:flex;gap:12px;justify-content:center">'
      +'<button onclick="tfa(true)" style="padding:16px 32px;background:#ECFDF5;border:2px solid #059669;border-radius:12px;font-size:1.1rem;font-weight:800;color:#059669;cursor:pointer;font-family:\'Inter\',sans-serif">✓ BENAR</button>'
      +'<button onclick="tfa(false)" style="padding:16px 32px;background:#FEF2F2;border:2px solid #DC2626;border-radius:12px;font-size:1.1rem;font-weight:800;color:#DC2626;cursor:pointer;font-family:\'Inter\',sans-serif">✗ SALAH</button>'
      +'</div></div>';
  }
  window.tfa=function(ans){
    if(ans===stmts[cur].a)correct++;
    cur++;
    if(cur>=stmts.length){var s=Math.round(correct/stmts.length*100);gameResult(body,s,correct,stmts.length,Math.round(curGame.xp*s/100),curGame.name);}
    else render();
  };
  render();
}

// ── FLASHCARD ──
function loadFlash(body){
  var cards=[
    {f:"Hukum Permintaan",b:"Jika harga naik, permintaan turun (ceteris paribus)"},
    {f:"Fotosintesis",b:"Proses tumbuhan mengubah CO₂ + H₂O + cahaya → glukosa + O₂"},
    {f:"Teorema Pythagoras",b:"a² + b² = c² pada segitiga siku-siku"},
    {f:"Proklamasi Indonesia",b:"17 Agustus 1945, dibacakan Soekarno-Hatta"},
    {f:"Kata Baku",b:"Kata yang sesuai KBBI, contoh: aktivitas, analisis, teknik"},
    {f:"Sistem Ekonomi",b:"Cara negara mengatur produksi, distribusi, dan konsumsi"},
  ];
  var cur=0,known=0;
  function render(){
    var c=cards[cur];
    body.innerHTML='<div style="text-align:center;font-size:.8rem;color:#9CA3AF;margin-bottom:12px">'+(cur+1)+'/'+cards.length+' — Klik kartu untuk balik</div>'
      +'<div class="fc-card" id="fc" onclick="document.getElementById(\'fc-inner\').classList.toggle(\'flip\')">'
        +'<div class="fc-inner" id="fc-inner">'
          +'<div class="fc-face fc-front">'+c.f+'</div>'
          +'<div class="fc-face fc-back">'+c.b+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:10px;justify-content:center;margin-top:20px">'
      +'<button onclick="fcNext(false)" style="padding:10px 22px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;font-weight:600;cursor:pointer;color:#DC2626;font-family:\'Inter\',sans-serif">✗ Belum Tahu</button>'
      +'<button onclick="fcNext(true)" style="padding:10px 22px;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;font-weight:600;cursor:pointer;color:#059669;font-family:\'Inter\',sans-serif">✓ Sudah Tahu</button>'
      +'</div>';
  }
  window.fcNext=function(k){if(k)known++;cur++;if(cur>=cards.length){var s=Math.round(known/cards.length*100);gameResult(body,s,known,cards.length,Math.round(curGame.xp*s/100),curGame.name);}else render();};
  render();
}

// ── MEMORY MATCH ──
function loadMemory(body){
  var pairs=[['📊','Ekonomi'],['🧮','Matematika'],['🔬','Sains'],['✍️','Bahasa'],['🏛','Sejarah'],['🎵','Musik']];
  var cards=[];
  pairs.forEach(function(p,i){cards.push({id:i*2,val:p[0],pair:i});cards.push({id:i*2+1,val:p[1],pair:i});});
  cards.sort(function(){return Math.random()-.5;});
  var flipped=[],matched=[],moves=0,locked=false;
  function render(){
    body.innerHTML='<div style="text-align:center;font-size:.82rem;color:#9CA3AF;margin-bottom:12px">Gerakan: '+moves+' · Cocok: '+matched.length+'/'+pairs.length+'</div>'
      +'<div class="mem-grid">'+cards.map(function(c,i){
        var isFlip=flipped.indexOf(i)>=0||matched.indexOf(c.pair)>=0;
        var isMatch=matched.indexOf(c.pair)>=0;
        return'<div class="mem-card'+(isFlip?' flip':'')+(isMatch?' match':'')+'" onclick="memPick('+i+')">'+(isFlip?c.val:'')+'</div>';
      }).join('')+'</div>';
  }
  window.memPick=function(i){
    if(locked||flipped.indexOf(i)>=0||matched.indexOf(cards[i].pair)>=0)return;
    flipped.push(i);render();
    if(flipped.length===2){
      moves++;locked=true;
      if(cards[flipped[0]].pair===cards[flipped[1]].pair){matched.push(cards[flipped[0]].pair);flipped=[];locked=false;render();if(matched.length===pairs.length){gameResult(body,100,pairs.length,pairs.length,curGame.xp,curGame.name);}}
      else{setTimeout(function(){flipped=[];locked=false;render();},800);}
    }
  };
  render();
}

      +'<button onclick="wbCheck()" style="padding:9px 18px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Cek ✓</button>'

  window.wbPick=function(btn,l){answers.push(l);btn.disabled=true;btn.style.opacity='.3';var a=document.getElementById('wb-ans');a.innerHTML=answers.map(function(c){return'<span style="width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;background:#2563EB;color:#fff;border-radius:8px;font-weight:700">'+c+'</span>';}).join('');};
  window.wbClear=function(){answers=[];render();};
  window.wbCheck=function(){
    if(answers.join('')===words[cur].word){toast('✅ Benar!');cur++;setTimeout(function(){if(cur>=words.length)gameResult(body,100,words.length,words.length,curGame.xp,curGame.name);else render();},600);}
    else{toast('❌ Coba lagi!');answers=[];render();}
  };
  render();
}

// ── SEQUENCE ──
function loadSeq(body){
  var seqs=[
    {title:"Proses Fotosintesis",steps:["Tumbuhan menyerap CO₂","Cahaya matahari diserap klorofil","Terjadi reaksi kimia","Glukosa dan O₂ dihasilkan"]},
    {title:"Langkah Metode Ilmiah",steps:["Observasi masalah","Rumusan hipotesis","Eksperimen","Analisis data","Kesimpulan"]},
    {title:"Proklamasi Kemerdekaan",steps:["Berita kekalahan Jepang","Soekarno-Hatta dibawa ke Rengasdengklok","Kembali ke Jakarta","Proklamasi dibacakan 17 Agustus 1945"]},
  ];
  var cur=0,order=[];
  function render(){
    var s=seqs[cur];
    order=[...s.steps].sort(function(){return Math.random()-.5;});
    body.innerHTML='<div style="font-weight:700;margin-bottom:12px">📋 '+s.title+'</div>'
      +'<div style="font-size:.83rem;color:#6B7280;margin-bottom:14px">Ketuk sesuai urutan yang benar:</div>'
      +'<div id="seq-chosen" style="min-height:40px;border:2px dashed #E5E7EB;border-radius:10px;padding:8px;margin-bottom:12px;font-size:.82rem;color:#9CA3AF">Pilih dari bawah...</div>'
      +'<div id="seq-opts">'+order.map(function(step,i){return'<button onclick="seqPick('+i+',this)" style="width:100%;margin-bottom:6px;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:10px;text-align:left;font-size:.84rem;cursor:pointer;background:#fff;font-family:\'Inter\',sans-serif">'+step+'</button>';}).join('')+'</div>'
      +'<div style="display:flex;gap:8px;justify-content:center;margin-top:12px"><button onclick="seqReset()" style="padding:9px 18px;background:#F3F4F6;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Reset</button><button onclick="seqCheck()" style="padding:9px 18px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Cek ✓</button></div>';
  }
  var chosen=[];
  window.seqPick=function(i,btn){chosen.push(order[i]);btn.disabled=true;btn.style.opacity='.3';document.getElementById('seq-chosen').innerHTML=chosen.map(function(s,n){return'<div style="padding:4px 0;font-size:.82rem;color:#111">'+(n+1)+'. '+s+'</div>';}).join('');};
  window.seqReset=function(){chosen=[];render();};
  window.seqCheck=function(){
    var ok=chosen.length===seqs[cur].steps.length&&chosen.every(function(s,i){return s===seqs[cur].steps[i];});
    if(ok){toast('✅ Urutan benar!');cur++;setTimeout(function(){if(cur>=seqs.length)gameResult(body,100,seqs.length,seqs.length,curGame.xp,curGame.name);else{chosen=[];render();}},600);}
    else{toast('❌ Urutan salah, coba lagi!');chosen=[];render();}
  };
  render();
}

// ── LOGIC GRID (mini Sudoku 4x4) ──
function loadLogic(body){
  var puzzle=[[1,0,3,0],[0,3,0,1],[3,0,1,0],[0,1,0,3]];
  var solution=[[1,2,3,4],[4,3,2,1],[3,4,1,2],[2,1,4,3]];
  body.innerHTML='<div style="font-size:.83rem;color:#6B7280;margin-bottom:14px">Isi grid 4×4 dengan angka 1-4. Setiap baris & kolom tidak boleh ada angka yang sama.</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-width:240px;margin:0 auto 16px">'
    +puzzle.map(function(row,r){return row.map(function(v,c){return v>0?'<div style="width:100%;aspect-ratio:1;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#2563EB">'+v+'</div>':'<input id="g'+r+c+'" type="number" min="1" max="4" style="width:100%;aspect-ratio:1;border:1.5px solid #E5E7EB;border-radius:8px;text-align:center;font-size:1rem;font-weight:700;outline:none;font-family:\'Inter\',sans-serif">';}).join('');}).join('')
    +'</div>'
    +'<div style="text-align:center"><button onclick="lgCheck()" style="padding:10px 24px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Cek Jawaban ✓</button></div>';
  window.lgCheck=function(){
    var ok=true;
    for(var r=0;r<4;r++){for(var c=0;c<4;c++){if(puzzle[r][c]===0){var v=parseInt(document.getElementById('g'+r+c).value)||0;if(v!==solution[r][c]){ok=false;}}}}
    if(ok)gameResult(body,100,1,1,curGame.xp,curGame.name);
    else toast('❌ Ada yang salah, coba lagi!');
  };
}

// ── KNOWLEDGE RACE ──
function loadRace(body){
  var level=1,lives=3,cur=0;
  var qs=[...QS].sort(function(){return Math.random()-.5;});
  function render(){
    if(cur>=qs.length)cur=0;
    var q=qs[cur];
    body.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-weight:700">Level '+level+'</span><span>❤️'.repeat(lives)+'🖤'.repeat(3-lives)+'</span></div>'
      +'<div style="font-weight:700;font-size:.95rem;margin-bottom:14px;line-height:1.5">'+q.q+'</div>'
      +q.opts.map(function(o,i){return'<button class="q-opt" onclick="rrPick('+i+')"><span style="width:24px;height:24px;border-radius:6px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0">'+'ABCD'[i]+'</span>'+o+'</button>';}).join('');
  }
  window.rrPick=function(i){
    var q=qs[cur];var opts=body.querySelectorAll('.q-opt');
    opts[q.a].classList.add('cor');
    if(i===q.a){cur++;if(cur%5===0&&cur>0){level++;if(level>3){gameResult(body,100,3,3,curGame.xp,curGame.name);return;}}render();}
    else{opts[i].classList.add('wrg');lives--;setTimeout(function(){if(lives<=0){gameResult(body,Math.round((level-1)/3*100),level-1,3,Math.round(curGame.xp*(level-1)/3),curGame.name);}else render();},800);}
  };
  render();
}

// ── PUZZLE BUILDER ──
function loadPuzzle(body){
  var concepts=[
    {title:"Siklus Air",pieces:["Evaporasi","Kondensasi","Presipitasi","Infiltrasi"],desc:"Urutan siklus air di alam"},
    {title:"Rantai Makanan",pieces:["Produsen (Tumbuhan)","Konsumen I (Herbivora)","Konsumen II (Karnivora)","Pengurai"],desc:"Aliran energi dalam ekosistem"},
    {title:"Struktur Pemerintahan",pieces:["Presiden","Menteri","Gubernur","Bupati/Walikota"],desc:"Hierarki pemerintahan Indonesia"},
  ];
  var cur=0,placed=[];
  function render(){
    var c=concepts[cur];
    var shuffled=[...c.pieces].sort(function(){return Math.random()-.5;});
    placed=[];
    body.innerHTML='<div style="font-weight:700;margin-bottom:4px">🧩 '+c.title+'</div>'
      +'<div style="font-size:.82rem;color:#6B7280;margin-bottom:14px">'+c.desc+'</div>'
      +'<div id="pz-slots" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
      +c.pieces.map(function(p,i){return'<div id="slot'+i+'" style="border:2px dashed #E5E7EB;border-radius:10px;padding:12px;text-align:center;font-size:.82rem;color:#9CA3AF;min-height:48px">Slot '+(i+1)+'</div>';}).join('')
      +'</div>'
      +'<div id="pz-pieces" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">'
      +shuffled.map(function(p,i){return'<button onclick="pzPlace(\''+p+'\',this)" style="padding:8px 14px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;font-size:.82rem;font-weight:600;color:#2563EB;cursor:pointer;font-family:\'Inter\',sans-serif">'+p+'</button>';}).join('')
      +'</div>'
      +'<div style="text-align:center"><button onclick="pzCheck()" style="padding:9px 20px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif">Cek ✓</button></div>';
  }
  window.pzPlace=function(p,btn){placed.push(p);btn.disabled=true;btn.style.opacity='.3';var sl=document.getElementById('slot'+(placed.length-1));if(sl){sl.textContent=p;sl.style.borderColor='#2563EB';sl.style.color='#111';sl.style.background='#EFF6FF';}};
  window.pzCheck=function(){
    var c=concepts[cur];var ok=placed.length===c.pieces.length&&placed.every(function(p,i){return p===c.pieces[i];});
    if(ok){toast('✅ Puzzle benar!');cur++;setTimeout(function(){if(cur>=concepts.length)gameResult(body,100,concepts.length,concepts.length,curGame.xp,curGame.name);else render();},600);}
    else{toast('❌ Susunan belum tepat!');placed=[];render();}
  };
  render();
}

function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}
</script>
