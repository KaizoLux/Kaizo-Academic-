<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Masuk - Kaizo Academic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.logo{width:44px;height:44px;background:#2563eb;border-radius:10px;color:#fff;font-size:1.2rem;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
h2{font-size:1.3rem;font-weight:800;color:#111;margin-bottom:4px}
.gray{font-size:.85rem;color:#777;margin-bottom:20px}
.red{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:.82rem;color:#dc2626;margin-bottom:10px;display:none}
.green{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;font-size:.82rem;color:#166534;margin-bottom:10px;display:none}
label{display:block;font-size:.8rem;font-weight:600;color:#333;margin-top:12px;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:.9rem;outline:none;font-family:sans-serif}
input:focus{border-color:#2563eb}
.btn{width:100%;margin-top:16px;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:sans-serif}
.btn:disabled{opacity:.5}
.link{text-align:center;margin-top:12px;font-size:.83rem;color:#777}
.link a{color:#2563eb;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">K</div>
  <h2>Masuk</h2>
  <div class="gray">Masuk ke akun Kaizo Academic kamu</div>
  <div class="red" id="er"></div>
  <div class="green" id="ok"></div>
  <label>Email</label><input id="em" type="email" placeholder="email@kamu.com" autocomplete="email">
  <label>Password</label><input id="pw" type="password" placeholder="Password kamu" autocomplete="current-password">
  <button class="btn" id="btn" onclick="masuk()">Masuk</button>
  <div class="link">Belum punya akun? <a href="register.html">Daftar</a></div>
</div>
<script>
var SB_URL='https://kjcifrrkfpifdrwjufau.supabase.co';
var SB_KEY='sb_publishable_8sk82afIl_YihEiIFkvCwQ_LDz1I5C6';

function showEr(s){var e=document.getElementById('er');e.textContent=s;e.style.display='block';document.getElementById('ok').style.display='none';}
function showOk(s){var e=document.getElementById('ok');e.textContent=s;e.style.display='block';document.getElementById('er').style.display='none';}

async function sbGet(path){
  var r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.json();
}

function hp(s){var h=5381;for(var i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return'kz_'+(h>>>0).toString(16);}

try{if(localStorage.getItem('kaizo:session'))location.href='index.html';}catch(e){}
document.addEventListener('keydown',function(e){if(e.key==='Enter')masuk();});

async function masuk(){
  var em=document.getElementById('em').value.trim().toLowerCase();
  var pw=document.getElementById('pw').value;
  var btn=document.getElementById('btn');

  if(!em||em.indexOf('@')<0)return showEr('Masukkan email yang valid!');
  if(!pw)return showEr('Password wajib diisi!');

  btn.disabled=true;btn.textContent='Memproses...';

  try{
    var users=await sbGet('users?email=eq.'+encodeURIComponent(em)+'&password=eq.'+encodeURIComponent(hp(pw))+'&select=*');

    if(!users||users.length===0){
      btn.disabled=false;btn.textContent='Masuk';
      return showEr('Email atau password salah!');
    }

    var user=users[0];
    delete user.password;
    localStorage.setItem('kaizo:session',JSON.stringify(user));
    showOk('Berhasil! Mengalihkan...');
    setTimeout(function(){location.href='index.html';},800);

  }catch(e){
    btn.disabled=false;btn.textContent='Masuk';
    showEr('Error: '+e.message);
  }
}
</script>
</body>
</html>
