<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaizo Academic — Learn</title>
<script src="shared.js"></script>
<style>
/* LEARN LAYOUT */
.learn-layout { display: grid; grid-template-columns: 300px 1fr; gap: 0; min-height: calc(100vh - 64px); }
.sidebar { background: rgba(2,4,8,0.7); backdrop-filter: blur(20px); border-right: 1px solid var(--border-dim); padding: 24px 16px; overflow-y: auto; position: sticky; top: 64px; height: calc(100vh - 64px); }
.main-content { padding: 32px 40px 60px; min-height: calc(100vh - 64px); }

/* SIDEBAR */
.sidebar-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-dim); }
.sidebar-course-title { font-family: var(--font-display); font-size: .72rem; font-weight: 700; letter-spacing: .5px; color: var(--text-primary); margin-bottom: 8px; }
.sidebar-prog-label { font-family: var(--font-display); font-size: .55rem; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 6px; }
.sidebar-module { margin-bottom: 12px; }
.sidebar-module-title { font-family: var(--font-display); font-size: .6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); padding: 6px 8px; }
.sidebar-lesson { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: all .18s; margin-bottom: 3px; border: 1px solid transparent; }
.sidebar-lesson:hover { background: rgba(0,200,255,0.06); border-color: rgba(0,200,255,0.15); }
.sidebar-lesson.active { background: rgba(0,200,255,0.1); border-color: rgba(0,200,255,0.25); }
.sidebar-lesson.done { opacity: .7; }
.sidebar-lesson-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .75rem; flex-shrink: 0; background: rgba(0,200,255,0.07); }
.sidebar-lesson-title { font-size: .8rem; color: var(--text-secondary); flex: 1; line-height: 1.3; }
.sidebar-lesson.active .sidebar-lesson-title { color: var(--neon-blue); font-weight: 600; }
.sidebar-check { font-size: .8rem; color: var(--neon-green); }

/* LESSON CONTENT */
.lesson-header { margin-bottom: 24px; }
.lesson-breadcrumb { font-family: var(--font-display); font-size: .58rem; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 10px; }
.lesson-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; letter-spacing: -.5px; color: var(--text-primary); margin-bottom: 10px; }
.lesson-meta { display: flex; align-items: center; gap: 14px; font-family: var(--font-display); font-size: .6rem; letter-spacing: 1px; color: var(--text-muted); }
.lesson-body { font-family: var(--font-body); font-size: 1rem; color: var(--text-secondary); line-height: 1.9; max-width: 680px; }
.lesson-body strong { color: var(--text-primary); font-weight: 700; }
.lesson-body h2, .lesson-body h3 { color: var(--text-primary); font-family: var(--font-display); letter-spacing: .5px; margin: 24px 0 12px; }
.lesson-body ul, .lesson-body ol { padding-left: 24px; margin: 12px 0; }
.lesson-body li { margin-bottom: 8px; }
.lesson-body code { background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.15); border-radius: 5px; padding: 2px 7px; font-family: var(--font-mono); font-size: .85em; color: var(--neon-blue); }
.lesson-body blockquote { border-left: 3px solid var(--neon-blue); padding-left: 16px; margin: 16px 0; color: var(--text-muted); font-style: italic; }

/* QUIZ IN LESSON */
.quiz-opt { display: flex; align-items: center; gap: 14px; width: 100%; padding: 13px 17px; border: 1px solid var(--border-dim); border-radius: 11px; background: rgba(0,200,255,0.03); cursor: pointer; font-family: var(--font-body); font-size: .92rem; color: var(--text-primary); text-align: left; transition: all .18s; margin-bottom: 10px; }
.quiz-opt:hover { border-color: rgba(0,200,255,0.35); background: rgba(0,200,255,0.07); transform: translateX(3px); }
.quiz-opt.sel { border-color: rgba(0,200,255,0.5); background: rgba(0,200,255,0.1); color: var(--neon-blue); font-weight: 700; }
.quiz-opt.cor { border-color: rgba(0,255,157,0.5); background: rgba(0,255,157,0.07); color: var(--neon-green); font-weight: 700; }
.quiz-opt.wrg { border-color: rgba(255,0,60,0.4); background: rgba(255,0,60,0.06); color: var(--neon-red); font-weight: 700; }
.quiz-key { width: 30px; height: 30px; border-radius: 7px; border: 1px solid currentColor; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .62rem; font-weight: 800; flex-shrink: 0; background: rgba(0,0,0,0.3); }

/* NAVIGATION BOTTOM */
.lesson-nav { display: flex; align-items: center; gap: 12px; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border-dim); }

/* CERTIFICATE MODAL */
.cert-wrap { background: linear-gradient(135deg, rgba(2,8,20,.98), rgba(6,18,40,.97)); border: 1px solid rgba(255,224,0,0.3); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 600px; width: 92%; position: relative; overflow: hidden; animation: modal-in .3s ease; }
.cert-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--neon-yellow), var(--neon-orange), var(--neon-yellow)); }
.cert-border { position: absolute; inset: 8px; border: 1px solid rgba(255,224,0,0.12); border-radius: 14px; pointer-events: none; }
.cert-seal { font-size: 4rem; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(255,224,0,0.5)); animation: seal-in .5s .2s both; }
@keyframes seal-in { from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)} }

/* XP TOAST */
.xp-toast { position: fixed; top: 80px; right: 24px; z-index: 9999; background: linear-gradient(135deg, rgba(6,18,40,.97), rgba(2,8,20,.99)); border: 1px solid rgba(0,200,255,0.3); border-radius: 12px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 0 30px rgba(0,200,255,0.15), 0 20px 40px rgba(0,0,0,.6); animation: toast-in .3s ease; pointer-events: none; }
@keyframes toast-in { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none} }

@media(max-width:768px) {
  .learn-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main-content { padding: 24px 16px 40px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="scanlines"></div>
<div id="navbar-placeholder"></div>

<!-- CERTIFICATE MODAL -->
<div class="ov" id="cert-modal" style="display:none">
  <div class="cert-wrap" id="cert-content">
    <div class="cert-border"></div>
    <div class="cert-seal">🎓</div>
    <div style="font-family:var(--font-display);font-size:.62rem;letter-spacing:3px;color:var(--neon-yellow);margin-bottom:12px">SERTIFIKAT PENYELESAIAN</div>
    <div style="font-size:.9rem;color:var(--text-secondary);margin-bottom:6px">Ini membuktikan bahwa</div>
    <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:var(--text-primary);margin-bottom:4px" id="cert-name"></div>
    <div style="font-size:.88rem;color:var(--text-secondary);margin-bottom:6px">telah berhasil menyelesaikan course</div>
    <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--neon-blue);margin-bottom:20px" id="cert-course"></div>
    <div style="border-top:1px solid rgba(255,224,0,0.15);padding-top:16px;margin-bottom:20px;font-size:.8rem;color:var(--text-muted)">
      <div id="cert-date"></div>
      <div style="margin-top:4px">Kaizo Academic Platform</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-yellow" onclick="downloadCertificate()">📥 Download</button>
      <button class="btn btn-ghost" onclick="document.getElementById('cert-modal').style.display='none'">Tutup</button>
    </div>
  </div>
</div>

<!-- XP TOAST -->
<div id="xp-toast" style="display:none" class="xp-toast">
  <div style="font-size:1.5rem">⚡</div>
  <div>
    <div style="font-family:var(--font-display);font-size:.65rem;font-weight:700;letter-spacing:1px;color:var(--neon-blue)" id="toast-xp-val">+10 XP</div>
    <div style="font-size:.78rem;color:var(--text-muted)" id="toast-xp-msg">Lesson selesai!</div>
  </div>
</div>

<main style="position:relative;z-index:2">
  <div class="learn-layout" id="learn-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar"></aside>
    <!-- MAIN -->
    <div class="main-content" id="lesson-content"></div>
  </div>
</main>

<style id="shared-styles"></style>
<script>
document.getElementById('shared-styles').textContent = SHARED_CSS;
document.getElementById('navbar-placeholder').innerHTML = renderNavbar('courses.html');

const params = new URLSearchParams(window.location.search);
const courseId = params.get('course');
const courses = KS.get("courses") || DEFAULT_COURSES;
const course = courses.find(c=>c.id===courseId);
const user = UserData.get();

if(!course) {
  document.getElementById('lesson-content').innerHTML = `<div style="text-align:center;padding:80px 20px"><div style="font-size:3rem;margin-bottom:16px">🔍</div><div style="font-family:var(--font-display);color:var(--text-muted)">COURSE TIDAK DITEMUKAN</div><a href="courses.html" class="btn btn-primary" style="margin-top:20px">← Kembali</a></div>`;
} else {
  document.title = course.title + ' — Kaizo Academic';
  const allLessons = course.modules.flatMap(m => m.lessons.map(l => ({...l, moduleTitle: m.title})));
  let curLessonIdx = parseInt(params.get('lesson')||'0');
  if(curLessonIdx >= allLessons.length) curLessonIdx = 0;

  function getProgress() { return UserData.getCourseProgress(courseId); }

  function renderSidebar() {
    let lessonIdx = 0;
    const html = `
      <div class="sidebar-header">
        <a href="courses.html" style="font-family:var(--font-display);font-size:.58rem;letter-spacing:1px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;margin-bottom:12px">← Courses</a>
        <div class="sidebar-course-title">${course.title}</div>
        <div class="sidebar-prog-label">${getProgress()}% SELESAI</div>
        <div class="prog"><div class="progf" style="width:${getProgress()}%"></div></div>
      </div>
      ${course.modules.map(m => {
        const mHtml = `<div class="sidebar-module">
          <div class="sidebar-module-title">${m.title}</div>
          ${m.lessons.map(l => {
            const idx = lessonIdx++;
            const done = user.completedLessons?.includes(`${courseId}:${l.id}`);
            const typeIcon = {text:'📄',video:'🎥',quiz:'⚡',pdf:'📑',assignment:'📝'}[l.type]||'📄';
            return `<div class="sidebar-lesson${idx===curLessonIdx?' active':''}${done?' done':''}" onclick="loadLesson(${idx})">
              <div class="sidebar-lesson-icon">${typeIcon}</div>
              <div class="sidebar-lesson-title">${l.title}</div>
              ${done?`<div class="sidebar-check">✓</div>`:''}
            </div>`;
          }).join('')}
        </div>`;
        return mHtml;
      }).join('')}
    `;
    document.getElementById('sidebar').innerHTML = html;
  }

  function markdownToHtml(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[hul])/gm, '')
      .split('\n').filter(l=>l.trim()).join('\n');
  }

  let quizAnswers = {};
  let quizSubmitted = false;

  function renderQuizLesson(lesson) {
    const quizData = DEFAULT_QUESTIONS.slice(0, 5);
    quizAnswers = {};
    quizSubmitted = false;
    return `
      <div style="margin-bottom:24px;padding:18px;background:rgba(255,140,0,0.05);border:1px solid rgba(255,140,0,0.2);border-radius:12px">
        <div style="font-family:var(--font-display);font-size:.65rem;letter-spacing:2px;color:var(--neon-orange);margin-bottom:4px">⚡ MINI QUIZ</div>
        <div style="font-size:.88rem;color:var(--text-secondary)">Jawab semua soal untuk mendapatkan XP bonus!</div>
      </div>
      <div id="quiz-questions">
        ${quizData.map((q,i) => `
          <div style="margin-bottom:24px" id="qblock-${i}">
            <div style="font-weight:600;color:var(--text-primary);margin-bottom:12px;font-size:.95rem;line-height:1.6">${i+1}. ${q.text}</div>
            ${q.options.map((opt,oi) => `
              <button class="quiz-opt" id="qopt-${i}-${oi}" onclick="selectQuizOpt(${i},${oi},${q.answer})">
                <div class="quiz-key">${['A','B','C','D'][oi]}</div>
                <div>${opt}</div>
              </button>`).join('')}
          </div>`).join('')}
      </div>
      <div id="quiz-result" style="display:none"></div>
      <button class="btn btn-primary btn-xl" id="quiz-submit-btn" onclick="submitQuiz(${quizData.length})" style="margin-top:8px">⚡ Submit Quiz</button>
    `;
  }

  window.selectQuizOpt = function(qIdx, optIdx, correctIdx) {
    if(quizSubmitted) return;
    quizAnswers[qIdx] = optIdx;
    ['A','B','C','D'].forEach((_,i) => {
      const btn = document.getElementById(`qopt-${qIdx}-${i}`);
      if(btn) { btn.classList.remove('sel'); }
    });
    const selected = document.getElementById(`qopt-${qIdx}-${optIdx}`);
    if(selected) selected.classList.add('sel');
  };

  window.submitQuiz = function(total) {
    if(Object.keys(quizAnswers).length < total) { alert(`Jawab semua ${total} soal dulu!`); return; }
    quizSubmitted = true;
    const quizData = DEFAULT_QUESTIONS.slice(0, total);
    let correct = 0;
    quizData.forEach((q,i) => {
      const chosen = quizAnswers[i];
      if(chosen === q.answer) correct++;
      ['A','B','C','D'].forEach((_,oi) => {
        const btn = document.getElementById(`qopt-${i}-${oi}`);
        if(!btn) return;
        btn.classList.remove('sel');
        if(oi === q.answer) btn.classList.add('cor');
        else if(oi === chosen && chosen !== q.answer) btn.classList.add('wrg');
      });
    });
    const score = Math.round(correct/total*100);
    const xpEarned = Math.round(score/10)*5 + 20;
    document.getElementById('quiz-submit-btn').style.display = 'none';
    document.getElementById('quiz-result').style.display = 'block';
    document.getElementById('quiz-result').innerHTML = `
      <div style="padding:20px;background:${score>=70?'rgba(0,255,157,0.06)':'rgba(255,0,60,0.06)'};border:1px solid ${score>=70?'rgba(0,255,157,0.25)':'rgba(255,0,60,0.25)'};border-radius:12px;text-align:center;margin-top:16px">
        <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:${score>=70?'var(--neon-green)':'var(--neon-red)'}">${score}</div>
        <div style="font-family:var(--font-display);font-size:.6rem;letter-spacing:2px;color:var(--text-muted);margin-bottom:12px">NILAI KAMU</div>
        <div style="font-size:.9rem;color:var(--text-secondary);margin-bottom:12px">${correct}/${total} benar · +${xpEarned} XP</div>
      </div>`;
    // Save quiz result
    const u = UserData.get();
    u.quizResults = u.quizResults||[];
    u.quizResults.push({courseId, score, time: Date.now()});
    if(score>=100) u.badges = u.badges||[];
    UserData.set(u);
    showXPToast(xpEarned, `Quiz selesai! ${score}/100`);
    UserData.addXP(xpEarned);
    markLessonDone();
  };

  function showXPToast(xp, msg) {
    const t = document.getElementById('xp-toast');
    document.getElementById('toast-xp-val').textContent = `+${xp} XP`;
    document.getElementById('toast-xp-msg').textContent = msg;
    t.style.display = 'flex';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  function markLessonDone() {
    const lesson = allLessons[curLessonIdx];
    UserData.completeLesson(courseId, lesson.id);
    const updatedUser = UserData.get();
    // Reload user ref
    Object.assign(user, updatedUser);
    renderSidebar();
    checkCourseCompletion();
  }

  function checkCourseCompletion() {
    const prog = UserData.getCourseProgress(courseId);
    if(prog === 100 && !user.completedCourses?.includes(courseId)) {
      UserData.completeCourse(courseId);
      showCertificate();
    }
  }

  function showCertificate() {
    document.getElementById('cert-name').textContent = user.name || 'Peserta';
    document.getElementById('cert-course').textContent = course.title;
    document.getElementById('cert-date').textContent = 'Diselesaikan pada: ' + new Date().toLocaleDateString('id-ID', {year:'numeric',month:'long',day:'numeric'});
    document.getElementById('cert-modal').style.display = 'flex';
  }

  window.downloadCertificate = function() {
    const content = document.getElementById('cert-content').innerHTML;
    const w = window.open('', '_blank');
    const theme = Theme.get();
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Certificate - ${course.title}</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>body{background:#020408;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:'Rajdhani',sans-serif}
    :root{--neon-blue:#00c8ff;--neon-yellow:#ffe000;--neon-orange:#ff8c00;--text-primary:#e8f4ff;--text-secondary:#7090b0;--text-muted:#3a5070;--border-dim:rgba(0,200,255,0.1);--font-display:'Orbitron',monospace;--font-body:'Rajdhani',sans-serif}
    .cert-wrap{background:linear-gradient(135deg,rgba(2,8,20,.98),rgba(6,18,40,.97));border:1px solid rgba(255,224,0,0.3);border-radius:20px;padding:48px 40px;text-align:center;max-width:600px;position:relative}
    .cert-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffe000,#ff8c00,#ffe000)}
    .cert-border{position:absolute;inset:8px;border:1px solid rgba(255,224,0,0.12);border-radius:14px}
    @media print{body{background:#fff}.cert-wrap{border:2px solid #gold}}</style>
    </head><body><div class="cert-wrap">${content.replace(/<div style="display:flex.*?<\/div>/s,'')}</div></body></html>`);
    w.document.close();
    setTimeout(() => w.print(), 500);
  };

  function loadLesson(idx) {
    curLessonIdx = idx;
    const lesson = allLessons[idx];
    const typeIcon = {text:'📄',video:'🎥',quiz:'⚡',pdf:'📑',assignment:'📝'}[lesson.type]||'📄';
    const isDone = user.completedLessons?.includes(`${courseId}:${lesson.id}`);
    const progress = getProgress();

    let bodyHtml = '';
    if(lesson.type === 'text') {
      bodyHtml = `<div class="lesson-body"><p>${markdownToHtml(lesson.content||'')}</p></div>`;
    } else if(lesson.type === 'video') {
      bodyHtml = `<div style="background:rgba(0,0,0,0.4);border:1px solid var(--border-dim);border-radius:14px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
        <div class="tc"><div style="font-size:4rem;margin-bottom:12px">🎥</div><div style="font-family:var(--font-display);font-size:.65rem;letter-spacing:2px;color:var(--text-muted)">VIDEO PLAYER</div></div>
      </div><div class="lesson-body"><p>${markdownToHtml(lesson.content||'Video lesson ini akan tersedia segera.')}</p></div>`;
    } else if(lesson.type === 'quiz') {
      bodyHtml = renderQuizLesson(lesson);
    }

    const isFirst = idx === 0;
    const isLast = idx === allLessons.length - 1;

    document.getElementById('lesson-content').innerHTML = `
      <div class="lesson-header">
        <div class="lesson-breadcrumb">${course.title} → ${lesson.moduleTitle}</div>
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-meta">
          <span>${typeIcon} ${lesson.type.toUpperCase()}</span>
          <span>⏱ ${lesson.duration}</span>
          <span>${progress}% course selesai</span>
          ${isDone?`<span style="color:var(--neon-green)">✓ SELESAI</span>`:''}
        </div>
      </div>
      <div class="prog" style="margin-bottom:28px"><div class="progf" style="width:${progress}%"></div></div>

      ${bodyHtml}

      ${lesson.type !== 'quiz' ? `
        <div class="lesson-nav">
          <button class="btn btn-ghost" onclick="loadLesson(${idx-1})" ${isFirst?'disabled':''}>← Prev</button>
          <div class="sp"></div>
          ${!isDone?`<button class="btn btn-success" onclick="completeLessonManual()">✓ Tandai Selesai</button>`:''}
          <button class="btn btn-primary" onclick="loadLesson(${idx+1})" ${isLast?'disabled':''}>Next →</button>
        </div>
        ${isLast && progress===100 ? `<div style="text-align:center;margin-top:20px"><button class="btn btn-yellow btn-xl" onclick="showCertificate()">🎓 Lihat Sertifikat</button></div>` : ''}
      ` : `
        <div class="lesson-nav">
          <button class="btn btn-ghost" onclick="loadLesson(${idx-1})" ${isFirst?'disabled':''}>← Prev</button>
          <div class="sp"></div>
          <button class="btn btn-primary" onclick="loadLesson(${idx+1})" ${isLast?'disabled':''}>Next →</button>
        </div>
      `}
    `;

    renderSidebar();
    window.scrollTo(0,0);
    // Update URL
    history.replaceState(null,'',`?course=${courseId}&lesson=${idx}`);
  }

  window.completeLessonManual = function() {
    markLessonDone();
    showXPToast(10, 'Lesson selesai!');
    loadLesson(curLessonIdx); // re-render
  };

  window.showCertificate = showCertificate;
  window.loadLesson = loadLesson;

  // Init
  loadLesson(curLessonIdx);
}
</script>
</body>
</html>
