let supabaseClient = null;
try {
  if (SUPABASE_URL !== "https://kjcifrrkfpifdrwjufau.supabase.co") {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
} catch(e) { console.warn("Supabase not configured:", e); }

// Storage API — pakai Supabase kalau ada, fallback ke localStorage
window.storage = {
  async get(key, shared) {
    if (shared && supabaseClient) {
      const { data, error } = await supabaseClient
        .from('kaizo_storage')
        .select('value')
        .eq('key', key)
        .single();
      if (error || !data) throw new Error('Key not found: ' + key);
      return { key, value: data.value, shared: true };
    }
    const val = localStorage.getItem((shared?'s:':'l:') + key);
    if (val === null) throw new Error('Key not found');
    return { key, value: val, shared: !!shared };
  },
  async set(key, value, shared) {
    if (shared && supabaseClient) {
      const { error } = await supabaseClient
        .from('kaizo_storage')
        .upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
      if (error) throw error;
      return { key, value, shared: true };
    }
    localStorage.setItem((shared?'s:':'l:') + key, value);
    return { key, value, shared: !!shared };
  },
  async delete(key, shared) {
    if (shared && supabaseClient) {
      await supabaseClient.from('kaizo_storage').delete().eq('key', key);
      return { key, deleted: true, shared: true };
    }
    localStorage.removeItem((shared?'s:':'l:') + key);
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    if (shared && supabaseClient) {
      const { data, error } = await supabaseClient
        .from('kaizo_storage')
        .select('key')
        .like('key', (prefix||'') + '%');
      if (error) throw error;
      return { keys: (data||[]).map(d => d.key), prefix, shared: true };
    }
    const p = (shared?'s:':'l:') + (prefix||'');
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(p)) keys.push(k.replace(shared?'s:':'l:', ''));
    }
    return { keys, prefix, shared: !!shared };
  }
};

.sval{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:500;margin-bottom:3px}
.slbl{font-size:.68rem;color:var(--mt);font-weight:700;text-transform:uppercase;letter-spacing:.7px}
/* review */
.rvit{padding:14px;border-radius:12px;margin-bottom:10px;border:1.5px solid}
.rvit.ok{border-color:var(--gn);background:var(--gnd)}
.rvit.fl{border-color:var(--rd);background:var(--rdd)}
/* admin */
.adtable{width:100%;border-collapse:collapse}
.adtable th{text-align:left;font-size:.72rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--mt);padding:10px 12px;border-bottom:2px solid var(--bd)}
.adtable td{padding:12px;border-bottom:1px solid var(--bd);font-size:.87rem;vertical-align:middle}
.adtable tr:last-child td{border-bottom:none}
.adtable tr:hover td{background:var(--sf)}
.qedit{border:1.5px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px;background:var(--sf)}
.qedit:hover{border-color:var(--ac)}
.qnum{display:inline-flex;align-items:center;font-size:.7rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ac);background:var(--acd);padding:3px 10px;border-radius:999px}
/* image preview */
.imgprev{width:100%;max-height:160px;object-fit:contain;border-radius:10px;border:1.5px solid var(--bd);margin-top:8px;background:var(--sf)}
/* misc */
.cgn{color:var(--gn)} .crd{color:var(--rd)} .cor{color:var(--or)} .cac{color:var(--ac)}
.mono{font-family:'DM Mono',monospace}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sp{flex:1}
.mb14{margin-bottom:14px} .mb20{margin-bottom:20px} .mt12{margin-top:12px} .mt20{margin-top:20px}
.div{height:1px;background:var(--bd);margin:18px 0}
.tc{text-align:center} .muted{color:var(--mt);font-size:.85rem}
.h2{font-size:1.1rem;font-weight:700;letter-spacing:-.3px;margin-bottom:5px}
.h3{font-size:.95rem;font-weight:700;margin-bottom:4px}
.sub{font-size:.84rem;color:var(--mt);margin-bottom:22px;line-height:1.6}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700}
.badgeG{background:var(--gnd);color:var(--gn)}
.badgeR{background:var(--rdd);color:var(--rd)}
.badgeA{background:var(--acd);color:var(--ac)}
@media(max-width:580px){.sgrid{grid-template-columns:1fr 1fr}.frow{grid-template-columns:1fr}}
`;

// ── utils ─────────────────────────────────────────────────────────────────────
const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const initials = n => n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase() || "?";
const toBase64 = file => new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });

// ── Logo ─────────────────────────────────────────────────────────────────────
function Logo() {
  return (
    <div className="logo">
      <div className="logo-box"><img src={`data:image/png;base64,${LOGO_B64}`} alt="K"/></div>
      <div><div className="logo-title">Kaizo Academic</div><div className="logo-sub">Exam Platform</div></div>
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("register");
  const [questions, setQuestions] = useState(DEFAULT_QUESTIONS);
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [regData, setRegData] = useState({ name:"", nim:"", email:"" });
  const [regErr, setRegErr] = useState("");
  const [regLoad, setRegLoad] = useState(false);
  const [curQ, setCurQ] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [timeLeft, setTimeLeft] = useState(600);
  const [violations, setViolations] = useState(0);
  const [cheatModal, setCheatModal] = useState(false);
  const [resetModal, setResetModal] = useState(false);
  const [result, setResult] = useState(null);
  const [leaderboard, setLb] = useState([]);
  const [lbLoad, setLbLoad] = useState(false);
  const [resultTab, setResultTab] = useState("result");
  const [adminModal, setAdminModal] = useState(false);
  const [adminPass, setAdminPass] = useState("");
  const [adminErr, setAdminErr] = useState("");
  const [adminScreen, setAdminScreen] = useState("dash");
  const [adminTab, setAdminTab] = useState("soal");
  const [editQ, setEditQ] = useState(null);
  const [saveMsg, setSaveMsg] = useState("");
  const examActive = useRef(false);
  const timerRef = useRef(null);
  const violRef = useRef(0);
  const warnOpen = useRef(false);
  const lastCheatTime = useRef(0);

  useEffect(() => {
    const s = document.createElement("style"); s.textContent = STYLES; document.head.appendChild(s);
    loadConfig();
    return () => document.head.removeChild(s);
  }, []);

  // ── storage ──────────────────────────────────────────────────────────────────
  async function loadConfig() {
    try {
      const r = await window.storage.get("kaizo:config", true);
      if (r) { const c = JSON.parse(r.value); setConfig(c.config||DEFAULT_CONFIG); setQuestions(c.questions||DEFAULT_QUESTIONS); }
    } catch {}
  }

  async function saveConfig(newConfig, newQuestions) {
    try {
      await window.storage.set("kaizo:config", JSON.stringify({ config: newConfig, questions: newQuestions }), true);
      setSaveMsg("✓ Tersimpan");
      setTimeout(() => setSaveMsg(""), 2000);
    } catch { setSaveMsg("✗ Gagal simpan"); }
  }

  async function loadLeaderboard() {
    setLbLoad(true);
    try {
      const keys = await window.storage.list("lb:", true);
      const entries = [];
      for (const key of keys.keys) {
        try { const r = await window.storage.get(key, true); if (r) entries.push(JSON.parse(r.value)); } catch {}
      }
      entries.sort((a,b) => b.score - a.score || a.time - b.time);
      setLb(entries.slice(0,10));
    } catch {}
    setLbLoad(false);
  }

  async function checkEmail(email) {
    try { await window.storage.get(`lb:${email.toLowerCase()}`, true); return true; } catch { return false; }
  }

  async function saveScore(entry) {
    try { await window.storage.set(`lb:${entry.email.toLowerCase()}`, JSON.stringify(entry), true); } catch {}
  }

  async function clearLeaderboard() {
    try {
      const keys = await window.storage.list("lb:", true);
      for (const key of keys.keys) { try { await window.storage.delete(key, true); } catch {} }
      setLb([]);
    } catch {}
  }

  // ── register ─────────────────────────────────────────────────────────────────
  async function handleRegister() {
    const { name, email } = regData;
    if (!name.trim()) return setRegErr("Nama wajib diisi");
    if (!email.trim() || !email.includes("@")) return setRegErr("Email tidak valid");
    setRegLoad(true); setRegErr("");
    const exists = await checkEmail(email);
    if (exists) { setRegErr("Email ini sudah pernah mengerjakan. 1 email = 1 kesempatan."); setRegLoad(false); return; }
    setRegLoad(false);
    startExam();
  }

  // ── exam ─────────────────────────────────────────────────────────────────────
  function startExam() {
    setScreen("exam"); setAnswers(new Array(questions.length).fill(null));
    setCurQ(0); setTimeLeft(config.duration * 60); setViolations(0);
    violRef.current = 0; examActive.current = true;
    startTimer(); setTimeout(bindAC, 300);
  }

  function startTimer() {
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if (t <= 1) { clearInterval(timerRef.current); if (examActive.current) doSubmit(); return 0; } return t-1; });
    }, 1000);
  }
  function stopTimer() { clearInterval(timerRef.current); }

  function bindAC() {
    document.addEventListener("visibilitychange", onVis);
  }
  function unbindAC() {
    document.removeEventListener("visibilitychange", onVis);
  }
  function onVis() {
    if (!examActive.current) return;
    if (document.visibilityState !== "hidden") return;
    // Debounce: ignore jika kurang dari 1 detik dari pelanggaran terakhir
    const now = Date.now();
    if (now - lastCheatTime.current < 1000) return;
    lastCheatTime.current = now;
    // Delay 500ms untuk pastikan benar-benar pindah tab, bukan animasi UI
    setTimeout(() => {
      if (document.hidden && examActive.current) cheat();
    }, 500);
  }

  function cheat() {
    if (warnOpen.current) return;
    violRef.current += 1; setViolations(violRef.current);
    if (violRef.current > (config.maxViolations||2)) { warnOpen.current=true; stopTimer(); setResetModal(true); }
    else { warnOpen.current=true; stopTimer(); setCheatModal(true); }
  }

  function closeCheat() { setCheatModal(false); warnOpen.current=false; startTimer(); }
  function doResetExam() {
    setResetModal(false); warnOpen.current=false;
    setAnswers(new Array(questions.length).fill(null));
    setCurQ(0); setTimeLeft(config.duration*60); violRef.current=0; setViolations(0); startTimer();
  }

  async function doSubmit() {
    examActive.current=false; stopTimer(); unbindAC();
    let benar=0;
    questions.forEach((q,i) => { if (answers[i]===q.answer) benar++; });
    const score = Math.round(benar/questions.length*100);
    const entry = { name:regData.name, nim:regData.nim, email:regData.email, score, benar, violations:violRef.current, time:Date.now() };
    setResult({ ...entry, answers:[...answers] });
    await saveScore(entry);
    loadLeaderboard();
    setScreen("result");
  }

  function confirmSubmit() {
    const un = answers.filter(a=>a===null).length;
    if (un>0 && !window.confirm(`${un} soal belum dijawab. Kumpulkan?`)) return;
    doSubmit();
  }

  // ── grade ─────────────────────────────────────────────────────────────────────
  function gradeInfo(score) {
    if (score>=90) return { grade:"A — Sangat Baik 🎯", color:"#00b96b", msg:"Luar biasa!" };
    if (score>=80) return { grade:"B — Baik 👍", color:"#0061ff", msg:"Bagus! Hampir sempurna." };
    if (score>=70) return { grade:"C — Cukup 📖", color:"#ff8c00", msg:"Cukup baik, terus tingkatkan." };
    return { grade:"D — Perlu Belajar ❌", color:"#ff3b5c", msg:"Jangan menyerah, pelajari lagi!" };
  }

  // ── admin ─────────────────────────────────────────────────────────────────────
  function tryAdmin() {
    if (adminPass === ADMIN_PASS) { setAdminModal(false); setAdminErr(""); setAdminPass(""); setScreen("admin"); loadLeaderboard(); }
    else setAdminErr("Password salah");
  }

  // ── RENDER ────────────────────────────────────────────────────────────────────

  // REGISTER
  if (screen === "register") return (
    <div className="wrap">
      {adminModal && (
        <div className="ov">
          <div className="modal green">
            <div style={{fontSize:"2.4rem",marginBottom:12}}>🔐</div>
            <div style={{fontSize:"1.2rem",fontWeight:800,marginBottom:8}}>Admin Login</div>
            <div style={{color:"var(--mt)",fontSize:".85rem",marginBottom:20}}>Masukkan password admin untuk lanjut.</div>
            <input className={`finput ${adminErr?"err":""}`} type="password" placeholder="Password admin"
              value={adminPass} onChange={e=>{setAdminPass(e.target.value);setAdminErr("");}}
              onKeyDown={e=>e.key==="Enter"&&tryAdmin()} autoFocus/>
            {adminErr && <div style={{color:"var(--rd)",fontSize:".8rem",marginTop:6,fontWeight:600}}>{adminErr}</div>}
            <div className="row mt12" style={{gap:8}}>
              <button className="btn btnG" style={{flex:1}} onClick={()=>{setAdminModal(false);setAdminPass("");setAdminErr("");}}>Batal</button>
              <button className="btn btnP" style={{flex:1}} onClick={tryAdmin}>Masuk →</button>
            </div>
          </div>
        </div>
      )}
      <div className="topbar">
        <Logo />
        <div className="row" style={{gap:8}}>
          <div className="pill"><div className="pill-dot" style={{background:"#00b96b",boxShadow:"0 0 6px #00b96b"}}/>v1.0 Anti-Cheat</div>
          <button className="btn btnG btnSm" onClick={()=>setAdminModal(true)}>⚙ Admin</button>
        </div>
      </div>

      <div className="card">
        <div className="h2">Daftar & Mulai Ujian</div>
        <div className="sub">Isi data diri sebelum mengerjakan. 1 email hanya bisa submit 1 kali.</div>
        <div className="fgroup">
          <label className="flabel">Nama Lengkap *</label>
          <input className="finput" placeholder="Nama lengkap" value={regData.name} onChange={e=>setRegData(p=>({...p,name:e.target.value}))}/>
        </div>
        <div className="fgroup">
          <label className="flabel">NIM / Nomor Peserta</label>
          <input className="finput" placeholder="Opsional" value={regData.nim} onChange={e=>setRegData(p=>({...p,nim:e.target.value}))}/>
        </div>
        <div className="fgroup" style={{marginBottom:0}}>
          <label className="flabel">Email *</label>
          <input className={`finput${regErr?" err":""}`} type="email" placeholder="nama@email.com"
            value={regData.email} onChange={e=>{setRegData(p=>({...p,email:e.target.value}));setRegErr("");}}/>
          {regErr && <div style={{color:"var(--rd)",fontSize:".8rem",marginTop:6,fontWeight:600}}>{regErr}</div>}
        </div>
      </div>

      <div className="card" style={{background:"linear-gradient(135deg,#fffbf2,#fff)",borderColor:"#ffe0a0"}}>
        <div className="row" style={{alignItems:"flex-start",gap:12}}>
          <div style={{fontSize:"1.3rem",marginTop:2}}>🛡</div>
          <div>
            <div style={{fontWeight:700,marginBottom:4,fontSize:".92rem"}}>Anti-Cheat Aktif — {config.title}</div>
            <div style={{fontSize:".82rem",color:"var(--sb)",lineHeight:1.65}}>
              {questions.length} soal · {config.duration} menit · Maks. {config.maxViolations}× pelanggaran sebelum reset
            </div>
          </div>
        </div>
      </div>

      <button className="btn btnP btnFull btnXl" onClick={handleRegister} disabled={regLoad} style={{marginTop:6}}>
        {regLoad ? "Memeriksa..." : "Mulai Ujian →"}
      </button>
      <button className="btn btnG btnFull mt20" onClick={()=>{loadLeaderboard();setScreen("lbonly");}}>🏆 Lihat Leaderboard</button>
    </div>
  );

  // LEADERBOARD ONLY
  if (screen === "lbonly") return (
    <div className="wrap">
      <div className="topbar"><Logo /><button className="btn btnG btnSm" onClick={()=>setScreen("register")}>← Kembali</button></div>
      <LbPanel lb={leaderboard} loading={lbLoad} myEmail={null} onRefresh={loadLeaderboard}/>
    </div>
  );

  // EXAM
  if (screen === "exam") {
    const q = questions[curQ];
    const vc = Math.min(violations, 2);
    return (
      <div className="wrap">
        {cheatModal && (
          <div className="ov"><div className="modal shake">
            <div style={{fontSize:"2.6rem",marginBottom:12}}>⚠️</div>
            <div style={{fontSize:"1.25rem",fontWeight:800,color:"var(--rd)",marginBottom:8}}>Tab Switching Terdeteksi</div>
            <div style={{display:"inline-block",fontFamily:"'DM Mono',monospace",background:"var(--rdd)",color:"var(--rd)",fontWeight:700,padding:"4px 14px",borderRadius:999,fontSize:".88rem",marginBottom:14}}>
              Pelanggaran {violations} / {config.maxViolations}
            </div>
            <div style={{color:"var(--sb)",fontSize:".86rem",lineHeight:1.7,marginBottom:22}}>
              {violations>=config.maxViolations ? "Ini pelanggaran terakhir! Keluar lagi = ujian direset." : `Pelanggaran ke-${violations} dari ${config.maxViolations}.`}
            </div>
            <button className="btn btnD btnFull" onClick={closeCheat}>Saya Mengerti — Kembali</button>
          </div></div>
        )}
        {resetModal && (
          <div className="ov"><div className="modal">
            <div style={{fontSize:"2.6rem",marginBottom:12}}>🚫</div>
            <div style={{fontSize:"1.25rem",fontWeight:800,color:"var(--rd)",marginBottom:8}}>Ujian Direset!</div>
            <div style={{color:"var(--sb)",fontSize:".86rem",lineHeight:1.7,marginBottom:22}}>Melebihi batas pelanggaran. Semua jawaban dihapus.</div>
            <button className="btn btnD btnFull" onClick={doResetExam}>Mulai Ulang</button>
          </div></div>
        )}
        <div className="acbar">
          <div className="acdot"/>Anti-Cheat Aktif — Jangan berpindah tab
          <div className="sp"/>
          <div className={`vb vb${vc}`}>{violations} Pelanggaran</div>
        </div>
        <div className="card" style={{padding:"13px 20px",marginBottom:14}}>
          <div className="row">
            <div><div style={{fontSize:".65rem",color:"var(--mt)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:1}}>Sesi Ujian</div>
            <div style={{fontWeight:800,fontSize:".93rem"}}>{config.title}</div></div>
            <div className="sp"/>
            <div className="row" style={{gap:18}}>
              <div className="tc"><div className="mono cac" style={{fontSize:"1.05rem",fontWeight:500}}>{curQ+1}/{questions.length}</div><div style={{fontSize:".62rem",color:"var(--mt)",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Soal</div></div>
              <div style={{width:1,height:28,background:"var(--bd)"}}/>
              <div className="tc"><div className="mono cac" style={{fontSize:"1.05rem",fontWeight:500}}>{answers.filter(a=>a!==null).length}</div><div style={{fontSize:".62rem",color:"var(--mt)",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Dijawab</div></div>
              <div style={{width:1,height:28,background:"var(--bd)"}}/>
              <div className={`timer${timeLeft<=60?" tc":timeLeft<=120?" tw":""}`}>{fmt(timeLeft)}</div>
            </div>
          </div>
        </div>
        <div className="prog"><div className="progf" style={{width:`${(curQ/questions.length)*100}%`}}/></div>
        <div className="card">
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--acd)",color:"var(--ac)",fontSize:".7rem",fontWeight:800,textTransform:"uppercase",letterSpacing:1,padding:"4px 12px",borderRadius:999,marginBottom:13}}>◈ Soal {curQ+1} dari {questions.length}</div>
          {q.image && <img src={q.image} alt="soal" className="imgprev" style={{marginBottom:14}}/>}
          <div style={{fontSize:"1.04rem",fontWeight:600,lineHeight:1.75,marginBottom:20}}>{q.text}</div>
          {q.options.map((opt,oi)=>(
            <button key={oi} className={`optb${answers[curQ]===oi?" sel":""}`} onClick={()=>{const a=[...answers];a[curQ]=oi;setAnswers(a);}}>
              <div className="optk">{["A","B","C","D"][oi]}</div>{opt}
            </button>
          ))}
        </div>
        <div className="row mb14">
          <button className="btn btnG" disabled={curQ===0} onClick={()=>setCurQ(c=>c-1)}>← Sebelumnya</button>
          <div className="sp"/>
          <button className="btn btnP" onClick={()=>curQ<questions.length-1?setCurQ(c=>c+1):confirmSubmit()}>
            {curQ===questions.length-1?"Selesai ✓":"Selanjutnya →"}
          </button>
        </div>
        <button className="btn btnS btnFull" style={{borderRadius:12,padding:14}} onClick={confirmSubmit}>✓ Kumpulkan Jawaban</button>
      </div>
    );
  }

  // RESULT
  if (screen === "result" && result) {
    const { grade, color, msg } = gradeInfo(result.score);
    const circ = 2*Math.PI*62;
    const off = circ - (result.score/100)*circ;
    const myRank = leaderboard.findIndex(e=>e.email===result.email)+1;
    return (
      <div className="wrap">
        <div className="topbar" style={{marginBottom:22}}>
          <Logo />
          {myRank>0 && <div className="pill" style={{borderColor:color,color}}>{myRank<=3?MEDAL[myRank-1]:`#${myRank}`} Peringkat {myRank}</div>}
        </div>
        <div className="tabs">
          <button className={`tab${resultTab==="result"?" on":""}`} onClick={()=>setResultTab("result")}>📋 Hasil</button>
          <button className={`tab${resultTab==="lb"?" on":""}`} onClick={()=>{setResultTab("lb");loadLeaderboard();}}>🏆 Leaderboard</button>
        </div>
        {resultTab==="result" && (
          <>
            <div className="card tc">
              <div className="ringwrap">
                <svg width="148" height="148" viewBox="0 0 148 148">
                  <circle cx="74" cy="74" r="62" fill="none" stroke="#e4e6f0" strokeWidth="10"/>
                  <circle cx="74" cy="74" r="62" fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} style={{transition:"stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)"}}/>
                </svg>
                <div className="ringin"><div className="ringsc" style={{color}}>{result.score}</div><div className="ringlb">NILAI</div></div>
              </div>
              <div style={{fontSize:"1.25rem",fontWeight:800,marginBottom:5}}>{grade}</div>
              <div style={{color:"var(--mt)",fontSize:".85rem"}}>{msg}</div>
              <div style={{marginTop:7,fontSize:".82rem",color:"var(--sb)"}}>Halo, <strong>{result.name}</strong>{result.nim?` (${result.nim})`:""}</div>
              <div className="sgrid">
                <div className="sbox"><div className="sval cgn">{result.benar}</div><div className="slbl">Benar</div></div>
                <div className="sbox"><div className="sval crd">{questions.length-result.benar}</div><div className="slbl">Salah</div></div>
                <div className="sbox"><div className="sval cor">{result.violations}</div><div className="slbl">Pelanggaran</div></div>
              </div>
            </div>
            <div className="card">
              <div className="h2" style={{marginBottom:14}}>Pembahasan</div>
              {questions.map((q,i)=>{
                const ua=result.answers[i]; const ok=ua===q.answer;
                return (
                  <div key={i} className={`rvit ${ok?"ok":"fl"}`}>
                    <div style={{fontWeight:700,marginBottom:7,fontSize:".87rem"}}>{i+1}. {q.text}</div>
                    {q.image && <img src={q.image} alt="" style={{maxHeight:80,borderRadius:8,marginBottom:7}}/>}
                    <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:".8rem",color:"var(--sb)"}}>
                      <span>Jawabanmu: <strong style={{color:ok?"var(--gn)":"var(--rd)"}}>{ua!==null?`${["A","B","C","D"][ua]}. ${q.options[ua]}`:"(tidak dijawab)"}</strong></span>
                      {!ok && <span>Benar: <strong style={{color:"var(--gn)"}}>{["A","B","C","D"][q.answer]}. {q.options[q.answer]}</strong></span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}
        {resultTab==="lb" && <LbPanel lb={leaderboard} loading={lbLoad} myEmail={result.email} onRefresh={loadLeaderboard}/>}
      </div>
    );
  }

  // ADMIN
  if (screen === "admin") {
    return (
      <div className="wrap">
        <div className="topbar">
          <Logo />
          <div className="row" style={{gap:8}}>
            {saveMsg && <div className="badge badgeG">{saveMsg}</div>}
            <button className="btn btnG btnSm" onClick={()=>setScreen("register")}>← Keluar Admin</button>
          </div>
        </div>

        <div className="card" style={{background:"linear-gradient(135deg,#f0f4ff,#fff)",borderColor:"#c0d0ff",marginBottom:20}}>
          <div className="row">
            <div style={{fontSize:"1.8rem"}}>⚙️</div>
            <div><div style={{fontWeight:800,fontSize:"1rem"}}>Panel Admin</div><div style={{fontSize:".8rem",color:"var(--mt)"}}>Kelola soal, pengaturan, dan data peserta</div></div>
          </div>
        </div>

        <div className="tabs">
          <button className={`tab${adminTab==="soal"?" on":""}`} onClick={()=>setAdminTab("soal")}>📝 Soal</button>
          <button className={`tab${adminTab==="setting"?" on":""}`} onClick={()=>setAdminTab("setting")}>⚙ Pengaturan</button>
          <button className={`tab${adminTab==="peserta"?" on":""}`} onClick={()=>{setAdminTab("peserta");loadLeaderboard();}}>👥 Peserta</button>
        </div>

        {/* ── TAB SOAL ── */}
        {adminTab==="soal" && (
          <div>
            <div className="row mb20">
              <div><div className="h2" style={{marginBottom:2}}>Daftar Soal</div><div style={{fontSize:".8rem",color:"var(--mt)"}}>{questions.length} soal tersimpan</div></div>
              <div className="sp"/>
              <button className="btn btnP btnSm" onClick={()=>{
                const nq=[...questions,{text:"Pertanyaan baru...",options:["Opsi A","Opsi B","Opsi C","Opsi D"],answer:0,image:""}];
                setQuestions(nq); saveConfig(config,nq);
              }}>+ Tambah Soal</button>
            </div>

            {questions.map((q,qi)=>(
              <div key={qi} className="qedit">
                <div className="row mb14">
                  <span className="qnum">Soal {qi+1}</span>
                  <div className="sp"/>
                  <button className="btn btnSm" style={{background:"var(--rdd)",color:"var(--rd)",border:"none"}} onClick={()=>{
                    const nq=questions.filter((_,i)=>i!==qi); setQuestions(nq); saveConfig(config,nq);
                  }}>Hapus</button>
                </div>

                <div className="fgroup">
                  <label className="flabel">Pertanyaan</label>
                  <textarea className="ftextarea" value={q.text} onChange={e=>{
                    const nq=[...questions]; nq[qi]={...nq[qi],text:e.target.value}; setQuestions(nq);
                  }} onBlur={()=>saveConfig(config,questions)}/>
                </div>

                <div className="fgroup">
                  <label className="flabel">Foto / Gambar (opsional)</label>
                  <input type="file" accept="image/*" style={{display:"none"}} id={`img-${qi}`}
                    onChange={async e=>{
                      const file=e.target.files[0]; if(!file) return;
                      const b64=await toBase64(file);
                      const nq=[...questions]; nq[qi]={...nq[qi],image:b64}; setQuestions(nq); saveConfig(config,nq);
                    }}/>
                  <div className="row" style={{gap:8}}>
                    <button className="btn btnG btnSm" onClick={()=>document.getElementById(`img-${qi}`).click()}>📷 Upload Foto</button>
                    {q.image && <button className="btn btnSm" style={{background:"var(--rdd)",color:"var(--rd)",border:"none"}} onClick={()=>{
                      const nq=[...questions]; nq[qi]={...nq[qi],image:""}; setQuestions(nq); saveConfig(config,nq);
                    }}>Hapus Foto</button>}
                  </div>
                  {q.image && <img src={q.image} alt="preview" className="imgprev"/>}
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {["A","B","C","D"].map((lbl,oi)=>(
                    <div key={oi} style={{display:"flex",alignItems:"center",gap:8}}>
                      <div onClick={()=>{const nq=[...questions];nq[qi]={...nq[qi],answer:oi};setQuestions(nq);saveConfig(config,nq);}}
                        style={{width:30,height:30,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".75rem",fontWeight:800,cursor:"pointer",transition:".18s",
                          background:q.answer===oi?"var(--gn)":"var(--white)",
                          border:`1.5px solid ${q.answer===oi?"var(--gn)":"var(--bd)"}`,
                          color:q.answer===oi?"#fff":"var(--sb)"}}>
                        {lbl}
                      </div>
                      <input className="finput" style={{padding:"7px 11px",fontSize:".83rem"}} value={q.options[oi]||""} placeholder={`Opsi ${lbl}`}
                        onChange={e=>{const nq=[...questions];nq[qi]={...nq[qi],options:nq[qi].options.map((o,i)=>i===oi?e.target.value:o)};setQuestions(nq);}}
                        onBlur={()=>saveConfig(config,questions)}/>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:9,fontSize:".73rem",color:"var(--mt)"}}>Klik A/B/C/D untuk set jawaban benar · Sekarang: <strong style={{color:"var(--gn)"}}>{["A","B","C","D"][q.answer]}</strong></div>
              </div>
            ))}

            <button className="btn btnP btnFull" style={{marginTop:4}} onClick={()=>saveConfig(config,questions)}>💾 Simpan Semua Soal</button>
          </div>
        )}

        {/* ── TAB SETTING ── */}
        {adminTab==="setting" && (
          <div className="card">
            <div className="h2" style={{marginBottom:4}}>Pengaturan Ujian</div>
            <div className="sub">Perubahan akan langsung berlaku untuk peserta berikutnya.</div>
            <div className="fgroup">
              <label className="flabel">Judul Ujian</label>
              <input className="finput" value={config.title} onChange={e=>setConfig(p=>({...p,title:e.target.value}))} onBlur={()=>saveConfig(config,questions)}/>
            </div>
            <div className="frow">
              <div className="fgroup">
                <label className="flabel">Durasi (menit)</label>
                <input className="finput" type="number" min="1" max="180" value={config.duration}
                  onChange={e=>setConfig(p=>({...p,duration:parseInt(e.target.value)||10}))} onBlur={()=>saveConfig(config,questions)}/>
              </div>
              <div className="fgroup">
                <label className="flabel">Maks. Pelanggaran</label>
                <select className="fselect" value={config.maxViolations} onChange={e=>{const nc={...config,maxViolations:parseInt(e.target.value)};setConfig(nc);saveConfig(nc,questions);}}>
                  <option value="1">1× langsung reset</option>
                  <option value="2">2× baru reset</option>
                  <option value="3">3× baru reset</option>
                </select>
              </div>
            </div>
            <button className="btn btnP btnFull" style={{marginTop:4}} onClick={()=>saveConfig(config,questions)}>💾 Simpan Pengaturan</button>
          </div>
        )}

        {/* ── TAB PESERTA ── */}
        {adminTab==="peserta" && (
          <div>
            <div className="row mb20">
              <div><div className="h2" style={{marginBottom:2}}>Data Peserta</div><div style={{fontSize:".8rem",color:"var(--mt)"}}>{leaderboard.length} peserta terdaftar</div></div>
              <div className="sp"/>
              <button className="btn btnSm" style={{background:"var(--rdd)",color:"var(--rd)",border:"none"}} onClick={()=>{if(window.confirm("Reset semua data peserta?")) clearLeaderboard();}}>🗑 Reset Semua</button>
              <button className="btn btnG btnSm" onClick={loadLeaderboard}>↻ Refresh</button>
            </div>
            {lbLoad ? <div className="tc muted" style={{padding:"30px 0"}}>Memuat...</div> :
            leaderboard.length === 0 ? <div className="tc muted" style={{padding:"36px 0"}}><div style={{fontSize:"2rem",opacity:.4,marginBottom:8}}>📭</div>Belum ada peserta</div> :
            <div className="card" style={{padding:0,overflow:"hidden"}}>
              <table className="adtable">
                <thead><tr>
                  <th>#</th><th>Nama</th><th>Email</th><th>NIM</th><th>Nilai</th><th>Benar</th><th>Pelanggaran</th>
                </tr></thead>
                <tbody>
                  {leaderboard.map((e,i)=>(
                    <tr key={e.email}>
                      <td style={{fontWeight:700}}>{i<3?MEDAL[i]:`#${i+1}`}</td>
                      <td style={{fontWeight:600}}>{e.name}</td>
                      <td style={{color:"var(--mt)",fontSize:".82rem"}}>{e.email}</td>
                      <td style={{color:"var(--mt)",fontSize:".82rem"}}>{e.nim||"—"}</td>
                      <td><span className="badge badgeA mono">{e.score}</span></td>
                      <td style={{color:"var(--gn)",fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{e.benar}/{questions.length}</td>
                      <td><span className={`badge ${e.violations>0?"badgeR":"badgeG"}`}>{e.violations}×</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>}
          </div>
        )}
      </div>
    );
  }

  return null;
}

// ── Leaderboard Panel ─────────────────────────────────────────────────────────
function LbPanel({ lb, loading, myEmail, onRefresh }) {
  return (
    <div className="card">
      <div className="row mb20">
        <div><div className="h2" style={{marginBottom:2}}>🏆 Top 10 Leaderboard</div><div style={{fontSize:".78rem",color:"var(--mt)"}}>Update otomatis setiap peserta selesai</div></div>
        <div className="sp"/>
        <button className="btn btnG btnSm" onClick={onRefresh}>↻ Refresh</button>
      </div>
      {loading && <div className="tc muted" style={{padding:"28px 0"}}>⏳ Memuat...</div>}
      {!loading && lb.length===0 && (
        <div className="tc" style={{padding:"36px 0",color:"var(--mt)"}}>
          <div style={{fontSize:"2rem",marginBottom:8,opacity:.4}}>📭</div>
          <div style={{fontWeight:600,fontSize:".9rem"}}>Belum ada peserta</div>
          <div style={{fontSize:".8rem",marginTop:5}}>Jadilah yang pertama!</div>
        </div>
      )}
      {!loading && lb.map((e,i)=>{
        const isMe = myEmail && e.email===myEmail;
        return (
          <div key={e.email} className={`lbrow${isMe?" me":""}`}>
            <div className="lbrank">{i<3?MEDAL[i]:`#${i+1}`}</div>
            <div className="lbav">{initials(e.name)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="lbname">{e.name}
                {isMe && <span style={{fontSize:".68rem",marginLeft:6,background:"var(--acd)",color:"var(--ac)",padding:"2px 7px",borderRadius:999,fontWeight:700}}>Kamu</span>}
              </div>
              <div className="lbmail">{e.nim?`${e.nim} · `:""}{e.email}</div>
            </div>
            <div className="tc">
              <div className="lbsc">{e.score}</div>
              <div style={{fontSize:".62rem",color:"var(--mt)",fontWeight:600}}>NILAI</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
